<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software 3D Renderer — Fable 5 Showcase</title>
<style>
  :root { --bg: #060b14; --text: #e8edf7; --muted: #8b96ad; --border: rgba(140,160,200,0.18); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.4rem;
    z-index: 2;
  }
  header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
  header a:hover { color: var(--text); }
  header .title { font-weight: 700; }
  header .title em {
    font-style: normal;
    background: linear-gradient(90deg, #2dd4bf, #7c6cff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #stage { flex: 1; position: relative; }
  canvas#c { position: absolute; inset: 0; width: 100%; height: 100%; cursor: grab; touch-action: none; }
  canvas#c.dragging { cursor: grabbing; }
  .panel {
    position: absolute;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.45rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: min(94vw, 820px);
    background: rgba(10, 16, 28, 0.82);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.6rem 0.8rem;
    backdrop-filter: blur(8px);
    z-index: 2;
  }
  .panel button {
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.42rem 0.85rem;
    font-size: 0.84rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .panel button:hover { background: rgba(255,255,255,0.1); }
  .panel button.active { background: rgba(124,108,255,0.3); border-color: #7c6cff; }
  .panel button.boom {
    background: linear-gradient(100deg, rgba(244,63,94,0.35), rgba(251,146,60,0.35));
    border-color: rgba(244,114,182,0.5);
  }
  .panel button.boom:hover { filter: brightness(1.3); }
  .stats {
    position: absolute;
    top: 0.8rem;
    right: 1.2rem;
    color: var(--muted);
    font-size: 0.76rem;
    text-align: right;
    line-height: 1.7;
    font-variant-numeric: tabular-nums;
    z-index: 2;
    pointer-events: none;
  }
  .hint {
    position: absolute;
    top: 0.8rem;
    left: 1.2rem;
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.7;
    z-index: 2;
    pointer-events: none;
  }
</style>
</head>
<body>
<header>
  <a href="../">← Fable 5 Showcase</a>
  <span class="title">SOFTWARE <em>3D RENDERER</em></span>
  <span style="width:110px"></span>
</header>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="hint">drag to rotate · scroll to zoom · double-click to detonate<br>left idle, it puts on a show</div>
  <div class="stats" id="stats"></div>
  <div class="panel" id="panel">
    <button data-shape="0">Torus</button>
    <button data-shape="1">Sphere</button>
    <button data-shape="2" class="active">Trefoil</button>
    <button data-shape="3">Cinquefoil</button>
    <button data-shape="4">Flower</button>
    <button data-shape="5">Coil</button>
    <button id="color">🎨 Iridescent</button>
    <button id="wire">Wireframe</button>
    <button id="glow" class="active">✨ Glow</button>
    <button id="spin" class="active">Auto-spin</button>
    <button id="explode" class="boom">💥 Detonate</button>
  </div>
</div>

<script>
'use strict';
// =============================================================
//  A complete 3D pipeline on a 2D canvas — no WebGL, no libs.
//  Parametric tube meshes → rotate → light → cull → sort → fill,
//  plus a bloom pass, iridescent shading, and per-face explosion
//  physics that tears the mesh apart and reassembles it.
// =============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const objCanvas = document.createElement('canvas');   // object layer (for bloom compositing)
const octx = objCanvas.getContext('2d');
const glowCanvas = document.createElement('canvas');  // quarter-res copy for cheap bloom
const gctx = glowCanvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  objCanvas.width = W * DPR; objCanvas.height = H * DPR;
  octx.setTransform(DPR, 0, 0, DPR, 0, 0);
  glowCanvas.width = Math.max(2, W >> 2); glowCanvas.height = Math.max(2, H >> 2);
}
addEventListener('resize', resize);

// ---------------- vector helpers ----------------
const vsub = (a, b) => [a[0]-b[0], a[1]-b[1], a[2]-b[2]];
const vcross = (a, b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
const vnorm = a => { const l = Math.hypot(a[0],a[1],a[2]) || 1; return [a[0]/l, a[1]/l, a[2]/l]; };

// ---------------- mesh generation ----------------
// Every shape is a tube swept along a closed 3D curve, sampled on the
// same NU x NV grid so vertices correspond 1:1 — which makes morphing
// between any two shapes a simple per-vertex lerp.
const NU = 96, NV = 30;

function tubeMesh(curve, tubeR) {
  const pos = new Float32Array(NU * NV * 3);
  for (let i = 0; i < NU; i++) {
    const t = i / NU * Math.PI * 2;
    const c = curve(t);
    const c2 = curve(t + 0.001);
    const T = vnorm(vsub(c2, c));
    const up = Math.abs(T[2]) < 0.95 ? [0, 0, 1] : [1, 0, 0];
    const B = vnorm(vcross(T, up));
    const N = vnorm(vcross(B, T));
    const r = typeof tubeR === 'function' ? tubeR(t) : tubeR;
    for (let j = 0; j < NV; j++) {
      const a = j / NV * Math.PI * 2;
      const k = (i * NV + j) * 3;
      pos[k]     = c[0] + (N[0] * Math.cos(a) + B[0] * Math.sin(a)) * r;
      pos[k + 1] = c[1] + (N[1] * Math.cos(a) + B[1] * Math.sin(a)) * r;
      pos[k + 2] = c[2] + (N[2] * Math.cos(a) + B[2] * Math.sin(a)) * r;
    }
  }
  return pos;
}

const SHAPES = [
  { name: 'Torus',      color: [45, 212, 191],
    mesh: () => tubeMesh(t => [Math.cos(t) * 1.25, Math.sin(t) * 1.25, 0], 0.52) },
  { name: 'Sphere',     color: [124, 108, 255],
    // a horn torus (tube radius = ring radius) closes into a sphere-like form
    mesh: () => tubeMesh(t => [Math.cos(t) * 0.86, Math.sin(t) * 0.86, 0], 0.86) },
  { name: 'Trefoil',    color: [244, 114, 182],
    mesh: () => tubeMesh(t => [
      (Math.cos(3 * t) * 0.45 + 1.05) * Math.cos(2 * t),
      (Math.cos(3 * t) * 0.45 + 1.05) * Math.sin(2 * t),
      Math.sin(3 * t) * 0.55
    ], 0.30) },
  { name: 'Cinquefoil', color: [96, 165, 250],
    mesh: () => tubeMesh(t => [
      (Math.cos(5 * t) * 0.38 + 1.12) * Math.cos(2 * t),
      (Math.cos(5 * t) * 0.38 + 1.12) * Math.sin(2 * t),
      Math.sin(5 * t) * 0.42
    ], 0.22) },
  { name: 'Flower',     color: [251, 146, 60],
    mesh: () => tubeMesh(
      t => [Math.cos(t) * (1.15 + 0.32 * Math.sin(5 * t)),
            Math.sin(t) * (1.15 + 0.32 * Math.sin(5 * t)),
            Math.cos(5 * t) * 0.22],
      t => 0.30 + 0.08 * Math.sin(5 * t)) },
  { name: 'Coil',       color: [250, 204, 21],
    mesh: () => tubeMesh(t => [
      (1.18 + 0.34 * Math.cos(8 * t)) * Math.cos(t),
      (1.18 + 0.34 * Math.cos(8 * t)) * Math.sin(t),
      Math.sin(8 * t) * 0.34
    ], 0.155) }
];
SHAPES.forEach(s => s.pos = s.mesh());

// face index list — shared by all shapes (grid wraps in both directions)
const FACES = [];
for (let i = 0; i < NU; i++) {
  for (let j = 0; j < NV; j++) {
    const i2 = (i + 1) % NU, j2 = (j + 1) % NV;
    FACES.push([i * NV + j, i2 * NV + j, i2 * NV + j2, i * NV + j2]);
  }
}
// per-face randomness for the explosion: blast magnitude + jitter direction
const faceFx = FACES.map(() => ({
  m: 0.7 + Math.random() * 1.9,
  jx: (Math.random() - 0.5) * 1.1,
  jy: (Math.random() - 0.5) * 1.1,
  jz: (Math.random() - 0.5) * 1.1
}));

// ---------------- scene state ----------------
let cur = 2, prev = 2, morph = 1;          // morph 0→1 between prev and cur
let rx = 0.45, ry = 0.6;                   // rotation angles
let vrx = 0, vry = 0;                      // drag inertia
let zoom = 0.9, autoSpin = true, wireframe = false, glowOn = true;
const COLOR_MODES = ['Iridescent', 'Solid', 'Depth'];
let colorMode = 0;
let boomT = -1;                            // -1 idle, else 0..1 through the explosion
let pendingShape = -1;                     // shape swap hidden at the blast peak
let lastInteract = performance.now();
let showStep = 0;
const LIGHT = vnorm([-0.5, -0.7, 0.9]);
const CAM_DIST = 4.2, FOCAL = 3.1;

const xf = new Float32Array(NU * NV * 3);  // view-space vertices
const px = new Float32Array(NU * NV);      // projected screen coords
const py = new Float32Array(NU * NV);
const drawList = [];

// parallax starfield
const STARS = Array.from({ length: 150 }, () => ({
  x: Math.random(), y: Math.random(),
  z: 0.25 + Math.random() * 0.75,
  r: Math.random() * 1.3 + 0.3
}));

// rises fast to 1 at t≈0.3, then eases back to 0 — the blast envelope
function boomCurve(t) {
  const up = Math.min(1, t / 0.3);
  const rise = 1 - Math.pow(1 - up, 3);
  if (t <= 0.3) return rise;
  const d = (t - 0.3) / 0.7;
  return 1 - d * d * (3 - 2 * d);
}
const easeInOut = t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2;
const lerpC = (a, b, t) => a + (b - a) * t;

function detonate(nextShape = -1) {
  if (boomT >= 0 && boomT < 0.6) return;   // already mid-blast
  boomT = 0;
  pendingShape = nextShape;
}

// ---------------- frame ----------------
let lastNow = performance.now();
function frame(now) {
  if (!W) resize();
  const dt = Math.min(0.05, (now - lastNow) / 1000);
  lastNow = now;

  // ----- idle show mode: detonate into the next shape, vary the view -----
  if (now - lastInteract > 9000 && boomT < 0) {
    showStep++;
    detonate((cur + 1) % SHAPES.length);
    lastInteract = now - 3500;             // next act in ~5.5s
    if (showStep % 3 === 0) colorMode = (colorMode + 1) % COLOR_MODES.length, syncUI();
  }

  // ----- explosion timeline -----
  let e = 0;
  if (boomT >= 0) {
    boomT += dt / 2.6;
    if (pendingShape >= 0 && boomT >= 0.3) {
      prev = cur = pendingShape;           // swap hidden inside the blast
      morph = 1;
      pendingShape = -1;
      syncUI();
    }
    if (boomT >= 1) boomT = -1;
    else e = boomCurve(boomT);
  }

  // ----- morph + rotate all vertices into view space -----
  const a = SHAPES[prev].pos, b = SHAPES[cur].pos;
  const m = morph < 1 ? easeInOut(morph) : 1;
  if (autoSpin && !dragging) { ry += (0.36 + e * 0.5) * dt; rx += 0.1 * dt; }
  rx += vrx; ry += vry; vrx *= 0.94; vry *= 0.94;
  const cxr = Math.cos(rx), sxr = Math.sin(rx);
  const cyr = Math.cos(ry), syr = Math.sin(ry);
  const scale = Math.min(W, H) * 0.36 * zoom;

  for (let v = 0; v < NU * NV; v++) {
    const k = v * 3;
    const x0 = a[k] + (b[k] - a[k]) * m;
    const y0 = a[k+1] + (b[k+1] - a[k+1]) * m;
    const z0 = a[k+2] + (b[k+2] - a[k+2]) * m;
    const x1 = x0 * cyr + z0 * syr;
    const z1 = -x0 * syr + z0 * cyr;
    const y2 = y0 * cxr - z1 * sxr;
    const z2 = y0 * sxr + z1 * cxr;
    xf[k] = x1; xf[k+1] = y2; xf[k+2] = z2;
    if (e < 0.001) {                       // fast path: shared projection
      const persp = FOCAL / (CAM_DIST + z2);
      px[v] = W / 2 + x1 * persp * scale;
      py[v] = H / 2 - y2 * persp * scale;
    }
  }

  // ----- per-face: shade, cull, (displace), project -----
  const baseR = lerpC(SHAPES[prev].color[0], SHAPES[cur].color[0], m);
  const baseG = lerpC(SHAPES[prev].color[1], SHAPES[cur].color[1], m);
  const baseB = lerpC(SHAPES[prev].color[2], SHAPES[cur].color[2], m);
  const hueDrift = now * 0.008;
  drawList.length = 0;

  for (let f = 0; f < FACES.length; f++) {
    const F = FACES[f];
    const k0 = F[0]*3, k1 = F[1]*3, k2 = F[2]*3, k3 = F[3]*3;
    let ax = xf[k0], ay = xf[k0+1], az = xf[k0+2];
    let bx = xf[k1], by = xf[k1+1], bz = xf[k1+2];
    let cx = xf[k2], cy = xf[k2+1], cz = xf[k2+2];
    let dx = xf[k3], dy = xf[k3+1], dz = xf[k3+2];

    // face normal (translation-invariant, so valid before displacement)
    const e1x = bx-ax, e1y = by-ay, e1z = bz-az;
    const e2x = cx-ax, e2y = cy-ay, e2z = cz-az;
    let nx = e1y*e2z - e1z*e2y, ny = e1z*e2x - e1x*e2z, nz = e1x*e2y - e1y*e2x;
    if (e < 0.001 && nz <= 0 && !wireframe) continue;   // backface cull (off mid-blast)
    const nl = Math.hypot(nx, ny, nz) || 1;
    nx /= nl; ny /= nl; nz /= nl;

    let p0x, p0y, p1x, p1y, p2x, p2y, p3x, p3y, depth;
    if (e >= 0.001) {
      // blast: shrink the face toward its centroid and hurl it outward
      const fx = faceFx[f];
      const mx = (ax+bx+cx+dx) / 4, my = (ay+by+cy+dy) / 4, mz = (az+bz+cz+dz) / 4;
      const sh = 1 - 0.35 * e;
      const ox = (nx * fx.m + fx.jx) * e * 1.5;
      const oy = (ny * fx.m + fx.jy) * e * 1.5;
      const oz = (nz * fx.m + fx.jz) * e * 1.5;
      ax = (ax-mx)*sh + mx + ox; ay = (ay-my)*sh + my + oy; az = (az-mz)*sh + mz + oz;
      bx = (bx-mx)*sh + mx + ox; by = (by-my)*sh + my + oy; bz = (bz-mz)*sh + mz + oz;
      cx = (cx-mx)*sh + mx + ox; cy = (cy-my)*sh + my + oy; cz = (cz-mz)*sh + mz + oz;
      dx = (dx-mx)*sh + mx + ox; dy = (dy-my)*sh + my + oy; dz = (dz-mz)*sh + mz + oz;
      if (CAM_DIST + Math.min(az, bz, cz, dz) < 0.4) continue;  // flew behind the camera
      let pr = FOCAL / (CAM_DIST + az); p0x = W/2 + ax*pr*scale; p0y = H/2 - ay*pr*scale;
      pr = FOCAL / (CAM_DIST + bz);     p1x = W/2 + bx*pr*scale; p1y = H/2 - by*pr*scale;
      pr = FOCAL / (CAM_DIST + cz);     p2x = W/2 + cx*pr*scale; p2y = H/2 - cy*pr*scale;
      pr = FOCAL / (CAM_DIST + dz);     p3x = W/2 + dx*pr*scale; p3y = H/2 - dy*pr*scale;
      depth = (az + bz + cz + dz) / 4;
    } else {
      p0x = px[F[0]]; p0y = py[F[0]]; p1x = px[F[1]]; p1y = py[F[1]];
      p2x = px[F[2]]; p2y = py[F[2]]; p3x = px[F[3]]; p3y = py[F[3]];
      depth = (az + bz + cz + dz) / 4;
    }

    // ----- shading -----
    const nzAbs = e >= 0.001 ? Math.abs(nz) : nz;       // light both sides mid-blast
    const dotL = nx*LIGHT[0] + ny*LIGHT[1] + nz*LIGHT[2];
    const lambert = e >= 0.001 ? Math.abs(dotL) : Math.max(0, dotL);
    const spec = Math.pow(Math.max(0, nzAbs), 8) * 0.35;
    const fog = 1 - Math.max(0, Math.min(0.45, (depth + 1.6) * 0.13));
    const li = (0.22 + 0.78 * lambert) * fog;
    let style;
    if (colorMode === 0) {                 // iridescent: hue from the surface normal
      const hue = (((Math.atan2(ny, nx) * 57.3 + nzAbs * 100 + hueDrift) % 360) + 360) % 360;
      const lit = Math.min(82, 24 + 52 * li + spec * 90);
      style = `hsl(${hue|0},78%,${lit|0}%)`;
    } else if (colorMode === 1) {          // solid shape color
      style = `rgb(${Math.min(255, baseR*li + 255*spec)|0},${Math.min(255, baseG*li + 255*spec)|0},${Math.min(255, baseB*li + 255*spec)|0})`;
    } else {                               // depth-mapped
      const dn = Math.max(0, Math.min(1, (depth + 1.9) / 3.8));
      const lit = Math.min(80, 22 + 55 * li + spec * 80);
      style = `hsl(${(185 + dn * 140)|0},85%,${lit|0}%)`;
    }
    drawList.push({ depth, style, p0x, p0y, p1x, p1y, p2x, p2y, p3x, p3y });
  }
  drawList.sort((p, q) => p.depth - q.depth);   // painter's algorithm: far first

  // ----- background + starfield (main canvas) -----
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#0a1322'); bg.addColorStop(1, '#04070e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  for (const s of STARS) {
    const sx = (((s.x + ry * 0.03 * s.z) % 1) + 1) % 1 * W;
    const sy = (((s.y + rx * 0.03 * s.z) % 1) + 1) % 1 * H;
    ctx.globalAlpha = 0.25 + s.z * 0.45;
    ctx.fillStyle = '#aebfdd';
    ctx.fillRect(sx, sy, s.r, s.r);
  }
  ctx.globalAlpha = 1;

  // ----- object layer -----
  octx.clearRect(0, 0, W, H);
  for (const d of drawList) {
    octx.beginPath();
    octx.moveTo(d.p0x, d.p0y);
    octx.lineTo(d.p1x, d.p1y);
    octx.lineTo(d.p2x, d.p2y);
    octx.lineTo(d.p3x, d.p3y);
    octx.closePath();
    if (wireframe) {
      octx.strokeStyle = d.style;
      octx.lineWidth = 1;
      octx.stroke();
    } else {
      octx.fillStyle = d.style;
      octx.fill();
      octx.strokeStyle = d.style;  // hairline stroke hides anti-alias seams
      octx.lineWidth = 0.6;
      octx.stroke();
    }
  }

  // ----- bloom: blurred quarter-res copy, additively composited -----
  if (glowOn) {
    gctx.clearRect(0, 0, glowCanvas.width, glowCanvas.height);
    gctx.drawImage(objCanvas, 0, 0, glowCanvas.width, glowCanvas.height);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.55 + e * 0.4;      // the blast flares the bloom
    try { ctx.filter = 'blur(9px)'; } catch (err) {}
    ctx.drawImage(glowCanvas, 0, 0, W, H);
    ctx.restore();
    ctx.filter = 'none';
  }
  ctx.drawImage(objCanvas, 0, 0, W, H);

  if (morph < 1) morph = Math.min(1, morph + 0.025);
  fps(now, e);
  requestAnimationFrame(frame);
}

// ---------------- stats ----------------
let frames = 0, lastFps = 0, fpsVal = 0;
const statsEl = document.getElementById('stats');
function fps(now, e) {
  frames++;
  if (now - lastFps > 500) {
    fpsVal = Math.round(frames * 1000 / (now - lastFps));
    frames = 0; lastFps = now;
    statsEl.innerHTML =
      `${NU * NV} vertices · ${FACES.length} faces · ${drawList.length} drawn<br>` +
      `${COLOR_MODES[colorMode].toLowerCase()} shading · ${fpsVal} fps · pure Canvas 2D` +
      (e > 0 ? `<br>💥 reassembling…` : '');
  }
}

// ---------------- interaction ----------------
let dragging = false, lastX = 0, lastY = 0;
function poke() { lastInteract = performance.now(); }
function down(x, y) { dragging = true; lastX = x; lastY = y; canvas.classList.add('dragging'); poke(); }
function move(x, y) {
  if (!dragging) return;
  vry = (x - lastX) * 0.006;
  vrx = (y - lastY) * 0.006;
  ry += vry; rx += vrx;
  lastX = x; lastY = y;
  poke();
}
function up() { dragging = false; canvas.classList.remove('dragging'); }
canvas.addEventListener('mousedown', e => down(e.clientX, e.clientY));
addEventListener('mousemove', e => move(e.clientX, e.clientY));
addEventListener('mouseup', up);
canvas.addEventListener('dblclick', () => { poke(); detonate(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); down(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchend', up);
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom = Math.max(0.4, Math.min(2.6, zoom * (e.deltaY > 0 ? 0.92 : 1.08)));
  poke();
}, { passive: false });

// ---------------- UI ----------------
const shapeBtns = [...document.querySelectorAll('[data-shape]')];
const colorBtn = document.getElementById('color');
function syncUI() {
  shapeBtns.forEach(btn => btn.classList.toggle('active', +btn.dataset.shape === (pendingShape >= 0 ? pendingShape : cur)));
  colorBtn.textContent = `🎨 ${COLOR_MODES[colorMode]}`;
}
shapeBtns.forEach(btn => btn.addEventListener('click', () => {
  poke();
  const idx = +btn.dataset.shape;
  if (idx === cur && morph >= 1) return;
  prev = cur; cur = idx; morph = 0;        // manual switch = smooth morph
  syncUI();
}));
colorBtn.addEventListener('click', () => {
  poke();
  colorMode = (colorMode + 1) % COLOR_MODES.length;
  syncUI();
});
document.getElementById('wire').addEventListener('click', e => {
  poke();
  wireframe = !wireframe;
  e.target.classList.toggle('active', wireframe);
});
document.getElementById('glow').addEventListener('click', e => {
  poke();
  glowOn = !glowOn;
  e.target.classList.toggle('active', glowOn);
});
document.getElementById('spin').addEventListener('click', e => {
  poke();
  autoSpin = !autoSpin;
  e.target.classList.toggle('active', autoSpin);
});
document.getElementById('explode').addEventListener('click', () => { poke(); detonate(); });

resize();
syncUI();
requestAnimationFrame(frame);
</script>
</body>
</html>
