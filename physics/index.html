<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tearable Cloth — verlet fibers · Fable 5</title>
<meta name="theme-color" content="#07070c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #ece9e2;
    --muted: #8a8fa3;
    --amber: #e3b264;
    --line: rgba(236, 233, 226, 0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #07070c;
    color: var(--ink);
    font-family: Inter, -apple-system, sans-serif;
    overflow: hidden;
  }
  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }

  .ui { position: fixed; z-index: 5; }
  #masthead { top: 1.4rem; left: 1.6rem; pointer-events: none; }
  #masthead .back {
    pointer-events: auto;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  #masthead .back:hover { color: var(--ink); }
  #masthead h1 {
    margin-top: 0.7rem;
    font-family: Fraunces, serif;
    font-style: italic;
    font-weight: 380;
    font-size: clamp(1.5rem, 3vw, 2.1rem);
    line-height: 1;
  }
  #masthead .sub {
    margin-top: 0.55rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #masthead .sub b { color: var(--amber); font-weight: 500; }

  #hint {
    bottom: 1.9rem; right: 1.6rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-align: right;
    line-height: 2;
    opacity: 0.85;
    pointer-events: none;
  }

  #panel {
    bottom: 1.6rem; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.35rem;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(9, 9, 14, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #panel button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 0.5rem 0.95rem;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.25s, background 0.25s;
    white-space: nowrap;
  }
  #panel button:hover { color: var(--ink); }
  #panel button.active { color: #0a0a0d; background: var(--amber); }
  #panel .sep { width: 1px; height: 1.1rem; background: var(--line); margin: 0 0.3rem; }

  @media (max-width: 760px) {
    #hint { display: none; }
    #panel { max-width: 94vw; overflow-x: auto; scrollbar-width: none; }
    #panel::-webkit-scrollbar { display: none; }
  }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>

<div class="ui" id="masthead">
  <a class="back" href="../">← Index</a>
  <h1>Tearable Cloth</h1>
  <div class="sub">verlet fibers · <b>snap</b> under stress</div>
</div>

<div class="ui" id="hint">
  drag to pull · right-drag or cut mode to slice<br>
  fibers glow ember as they near breaking
</div>

<div class="ui" id="panel">
  <button id="mode">Cut: off</button>
  <button id="wind">Wind: off</button>
  <button id="gravity" class="active">Gravity: on</button>
  <div class="sep"></div>
  <button id="reset">Reset</button>
</div>

<script>
'use strict';
// ============================================================
//  Cloth simulation via Verlet integration + constraint
//  relaxation. Each fiber is a distance constraint; pull too
//  hard and it snaps. Pure canvas, ~5k constraints in realtime.
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

const SPACING = 16, ITERATIONS = 3, TEAR_AT = 4.2, GRAV = 0.32, DAMP = 0.99;
let points = [], constraints = [];
let windOn = false, gravityOn = true, cutMode = false, t = 0;

function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

function buildCloth() {
  points = []; constraints = [];
  const cols = Math.min(70, Math.floor((W * 0.8) / SPACING));
  const rows = Math.min(40, Math.floor((H * 0.62) / SPACING));
  const x0 = (W - cols * SPACING) / 2, y0 = 36;
  for (let r = 0; r <= rows; r++) {
    for (let c = 0; c <= cols; c++) {
      points.push({
        x: x0 + c * SPACING, y: y0 + r * SPACING,
        px: x0 + c * SPACING, py: y0 + r * SPACING,
        pinned: r === 0 && c % 3 === 0
      });
    }
  }
  const idx = (r, c) => r * (cols + 1) + c;
  for (let r = 0; r <= rows; r++) {
    for (let c = 0; c <= cols; c++) {
      if (c < cols) constraints.push({ a: idx(r, c), b: idx(r, c + 1), rest: SPACING });
      if (r < rows) constraints.push({ a: idx(r, c), b: idx(r + 1, c), rest: SPACING });
    }
  }
}

// ---------------- simulation ----------------
function step() {
  t += 0.016;
  const wind = windOn ? (Math.sin(t * 1.3) * 0.6 + Math.sin(t * 2.7 + 1) * 0.4) * 0.25 + 0.18 : 0;

  for (const p of points) {
    if (p.pinned) continue;
    const vx = (p.x - p.px) * DAMP;
    const vy = (p.y - p.py) * DAMP;
    p.px = p.x; p.py = p.y;
    p.x += vx + wind * (1 + Math.sin(p.y * 0.02 + t * 2) * 0.5);
    p.y += vy + (gravityOn ? GRAV : 0);
  }

  for (let it = 0; it < ITERATIONS; it++) {
    for (let i = constraints.length - 1; i >= 0; i--) {
      const cn = constraints[i];
      const p1 = points[cn.a], p2 = points[cn.b];
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const dist = Math.hypot(dx, dy) || 0.0001;
      if (dist > cn.rest * TEAR_AT) { constraints.splice(i, 1); continue; }   // snap!
      const diff = (dist - cn.rest) / dist * 0.5;
      const ox = dx * diff, oy = dy * diff;
      if (!p1.pinned) { p1.x += ox; p1.y += oy; }
      if (!p2.pinned) { p2.x -= ox; p2.y -= oy; }
    }
  }

  // mouse interaction
  if (mouse.down) {
    if (cutMode || mouse.button === 2) {
      for (let i = constraints.length - 1; i >= 0; i--) {
        const cn = constraints[i];
        const p1 = points[cn.a], p2 = points[cn.b];
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        if ((mx - mouse.x) ** 2 + (my - mouse.y) ** 2 < 14 * 14) constraints.splice(i, 1);
      }
    } else if (mouse.grab !== -1) {
      const p = points[mouse.grab];
      p.x = mouse.x; p.y = mouse.y;
      p.px = mouse.x - (mouse.x - mouse.lx) * 0.4;   // carry fling velocity
      p.py = mouse.y - (mouse.y - mouse.ly) * 0.4;
    }
  }

  // keep cloth on screen
  for (const p of points) {
    if (p.y > H - 4) { p.y = H - 4; p.py = p.y + (p.y - p.py) * 0.4; }
    if (p.x < 4) p.x = 4;
    if (p.x > W - 4) p.x = W - 4;
  }
}

// ---------------- render ----------------
function draw() {
  ctx.fillStyle = '#07070c';
  ctx.fillRect(0, 0, W, H);

  ctx.lineWidth = 1.1;
  for (const cn of constraints) {
    const p1 = points[cn.a], p2 = points[cn.b];
    const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
    const strain = Math.max(0, Math.min(1, (dist / cn.rest - 1) / (TEAR_AT - 1.4)));
    // calm slate → ember as the fiber approaches its breaking point
    const r = Math.round(122 + strain * 133);
    const g = Math.round(132 - strain * 40);
    const b = Math.round(158 - strain * 95);
    ctx.strokeStyle = `rgba(${r},${g},${b},${0.5 + strain * 0.5})`;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  // pins
  ctx.fillStyle = '#e3b264';
  for (const p of points) {
    if (!p.pinned) continue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // cursor
  if (mouse.inside) {
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, cutMode ? 14 : 22, 0, Math.PI * 2);
    ctx.strokeStyle = cutMode ? 'rgba(227,178,100,0.8)' : 'rgba(236,233,226,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ---------------- input ----------------
const mouse = { x: 0, y: 0, lx: 0, ly: 0, down: false, button: 0, grab: -1, inside: false };
function pos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - rect.left, src.clientY - rect.top];
}
function press(e) {
  const [x, y] = pos(e);
  mouse.down = true;
  mouse.button = e.button || 0;
  mouse.x = mouse.lx = x; mouse.y = mouse.ly = y;
  // grab the nearest free point
  let best = 900, bi = -1;
  for (let i = 0; i < points.length; i++) {
    const d = (points[i].x - x) ** 2 + (points[i].y - y) ** 2;
    if (d < best) { best = d; bi = i; }
  }
  mouse.grab = bi;
}
canvas.addEventListener('mousedown', e => { e.preventDefault(); press(e); });
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousemove', e => {
  const [x, y] = pos(e);
  mouse.lx = mouse.x; mouse.ly = mouse.y;
  mouse.x = x; mouse.y = y;
  mouse.inside = true;
});
canvas.addEventListener('mouseleave', () => { mouse.inside = false; mouse.down = false; mouse.grab = -1; });
addEventListener('mouseup', () => { mouse.down = false; mouse.grab = -1; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); press(e); mouse.inside = true; }, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const [x, y] = pos(e);
  mouse.lx = mouse.x; mouse.ly = mouse.y;
  mouse.x = x; mouse.y = y;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.down = false; mouse.grab = -1; mouse.inside = false; });

// ---------------- UI ----------------
const modeBtn = document.getElementById('mode');
modeBtn.addEventListener('click', () => {
  cutMode = !cutMode;
  modeBtn.textContent = `Cut: ${cutMode ? 'on' : 'off'}`;
  modeBtn.classList.toggle('active', cutMode);
});
const windBtn = document.getElementById('wind');
windBtn.addEventListener('click', () => {
  windOn = !windOn;
  windBtn.textContent = `Wind: ${windOn ? 'on' : 'off'}`;
  windBtn.classList.toggle('active', windOn);
});
const gravBtn = document.getElementById('gravity');
gravBtn.addEventListener('click', () => {
  gravityOn = !gravityOn;
  gravBtn.textContent = `Gravity: ${gravityOn ? 'on' : 'off'}`;
  gravBtn.classList.toggle('active', gravityOn);
});
document.getElementById('reset').addEventListener('click', buildCloth);
addEventListener('resize', () => { resize(); buildCloth(); });

// ---------------- main loop ----------------
resize();
buildCloth();
(function loop() {
  step();
  draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
