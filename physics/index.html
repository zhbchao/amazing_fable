<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tearable Cloth — Fable 5 Showcase</title>
<style>
  :root { --bg: #070b15; --text: #e8edf7; --muted: #8b96ad; --border: rgba(140,160,200,0.18); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.4rem;
    z-index: 2;
  }
  header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
  header a:hover { color: var(--text); }
  header .title { font-weight: 700; }
  header .title em {
    font-style: normal;
    background: linear-gradient(90deg, #5e8bff, #2dd4bf);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #stage { flex: 1; position: relative; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
  .panel {
    position: absolute;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    background: rgba(10,16,28,0.82);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.6rem 0.8rem;
    backdrop-filter: blur(8px);
    z-index: 2;
  }
  .panel button {
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.45rem 0.95rem;
    font-size: 0.86rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }
  .panel button:hover { background: rgba(255,255,255,0.1); }
  .panel button.active { background: rgba(94,139,255,0.3); border-color: #5e8bff; }
  .hint {
    position: absolute;
    top: 0.8rem;
    left: 1.2rem;
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.7;
    z-index: 2;
    pointer-events: none;
  }
</style>
</head>
<body>
<header>
  <a href="../">← Fable 5 Showcase</a>
  <span class="title">TEARABLE <em>CLOTH</em></span>
  <span style="width:110px"></span>
</header>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="hint">drag to pull the cloth · right-drag (or ✂ mode) to cut<br>fibers glow red under stress and snap when overstretched</div>
  <div class="panel">
    <button id="mode">✂ Cut mode: off</button>
    <button id="wind">💨 Wind: off</button>
    <button id="gravity" class="active">⬇ Gravity: on</button>
    <button id="reset">↺ Reset cloth</button>
  </div>
</div>

<script>
'use strict';
// ============================================================
//  Cloth simulation via Verlet integration + constraint
//  relaxation. Each fiber is a distance constraint; pull too
//  hard and it snaps. Pure canvas, ~5k constraints in realtime.
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

const SPACING = 16, ITERATIONS = 3, TEAR_AT = 4.2, GRAV = 0.32, DAMP = 0.99;
let points = [], constraints = [];
let windOn = false, gravityOn = true, cutMode = false, t = 0;

function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

function buildCloth() {
  points = []; constraints = [];
  const cols = Math.min(70, Math.floor((W * 0.8) / SPACING));
  const rows = Math.min(40, Math.floor((H * 0.62) / SPACING));
  const x0 = (W - cols * SPACING) / 2, y0 = 36;
  for (let r = 0; r <= rows; r++) {
    for (let c = 0; c <= cols; c++) {
      points.push({
        x: x0 + c * SPACING, y: y0 + r * SPACING,
        px: x0 + c * SPACING, py: y0 + r * SPACING,
        pinned: r === 0 && c % 3 === 0
      });
    }
  }
  const idx = (r, c) => r * (cols + 1) + c;
  for (let r = 0; r <= rows; r++) {
    for (let c = 0; c <= cols; c++) {
      if (c < cols) constraints.push({ a: idx(r, c), b: idx(r, c + 1), rest: SPACING });
      if (r < rows) constraints.push({ a: idx(r, c), b: idx(r + 1, c), rest: SPACING });
    }
  }
}

// ---------------- simulation ----------------
function step() {
  t += 0.016;
  const wind = windOn ? (Math.sin(t * 1.3) * 0.6 + Math.sin(t * 2.7 + 1) * 0.4) * 0.25 + 0.18 : 0;

  for (const p of points) {
    if (p.pinned) continue;
    const vx = (p.x - p.px) * DAMP;
    const vy = (p.y - p.py) * DAMP;
    p.px = p.x; p.py = p.y;
    p.x += vx + wind * (1 + Math.sin(p.y * 0.02 + t * 2) * 0.5);
    p.y += vy + (gravityOn ? GRAV : 0);
  }

  for (let it = 0; it < ITERATIONS; it++) {
    for (let i = constraints.length - 1; i >= 0; i--) {
      const cn = constraints[i];
      const p1 = points[cn.a], p2 = points[cn.b];
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const dist = Math.hypot(dx, dy) || 0.0001;
      if (dist > cn.rest * TEAR_AT) { constraints.splice(i, 1); continue; }   // snap!
      const diff = (dist - cn.rest) / dist * 0.5;
      const ox = dx * diff, oy = dy * diff;
      if (!p1.pinned) { p1.x += ox; p1.y += oy; }
      if (!p2.pinned) { p2.x -= ox; p2.y -= oy; }
    }
  }

  // mouse interaction
  if (mouse.down) {
    if (cutMode || mouse.button === 2) {
      for (let i = constraints.length - 1; i >= 0; i--) {
        const cn = constraints[i];
        const p1 = points[cn.a], p2 = points[cn.b];
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        if ((mx - mouse.x) ** 2 + (my - mouse.y) ** 2 < 14 * 14) constraints.splice(i, 1);
      }
    } else if (mouse.grab !== -1) {
      const p = points[mouse.grab];
      p.x = mouse.x; p.y = mouse.y;
      p.px = mouse.x - (mouse.x - mouse.lx) * 0.4;   // carry fling velocity
      p.py = mouse.y - (mouse.y - mouse.ly) * 0.4;
    }
  }

  // keep cloth on screen
  for (const p of points) {
    if (p.y > H - 4) { p.y = H - 4; p.py = p.y + (p.y - p.py) * 0.4; }
    if (p.x < 4) p.x = 4;
    if (p.x > W - 4) p.x = W - 4;
  }
}

// ---------------- render ----------------
function draw() {
  ctx.fillStyle = '#070b15';
  ctx.fillRect(0, 0, W, H);

  ctx.lineWidth = 1.1;
  for (const cn of constraints) {
    const p1 = points[cn.a], p2 = points[cn.b];
    const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
    const strain = Math.max(0, Math.min(1, (dist / cn.rest - 1) / (TEAR_AT - 1.4)));
    // calm blue → hot red as the fiber approaches its breaking point
    const r = Math.round(94 + strain * 160);
    const g = Math.round(139 - strain * 90);
    const b = Math.round(255 - strain * 150);
    ctx.strokeStyle = `rgba(${r},${g},${b},${0.55 + strain * 0.45})`;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  // pins
  ctx.fillStyle = '#2dd4bf';
  for (const p of points) {
    if (!p.pinned) continue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // cursor
  if (mouse.inside) {
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, cutMode ? 14 : 22, 0, Math.PI * 2);
    ctx.strokeStyle = cutMode ? 'rgba(244,63,94,0.7)' : 'rgba(232,237,247,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ---------------- input ----------------
const mouse = { x: 0, y: 0, lx: 0, ly: 0, down: false, button: 0, grab: -1, inside: false };
function pos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - rect.left, src.clientY - rect.top];
}
function press(e) {
  const [x, y] = pos(e);
  mouse.down = true;
  mouse.button = e.button || 0;
  mouse.x = mouse.lx = x; mouse.y = mouse.ly = y;
  // grab the nearest free point
  let best = 900, bi = -1;
  for (let i = 0; i < points.length; i++) {
    const d = (points[i].x - x) ** 2 + (points[i].y - y) ** 2;
    if (d < best) { best = d; bi = i; }
  }
  mouse.grab = bi;
}
canvas.addEventListener('mousedown', e => { e.preventDefault(); press(e); });
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousemove', e => {
  const [x, y] = pos(e);
  mouse.lx = mouse.x; mouse.ly = mouse.y;
  mouse.x = x; mouse.y = y;
  mouse.inside = true;
});
canvas.addEventListener('mouseleave', () => { mouse.inside = false; mouse.down = false; mouse.grab = -1; });
addEventListener('mouseup', () => { mouse.down = false; mouse.grab = -1; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); press(e); mouse.inside = true; }, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const [x, y] = pos(e);
  mouse.lx = mouse.x; mouse.ly = mouse.y;
  mouse.x = x; mouse.y = y;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.down = false; mouse.grab = -1; mouse.inside = false; });

// ---------------- UI ----------------
const modeBtn = document.getElementById('mode');
modeBtn.addEventListener('click', () => {
  cutMode = !cutMode;
  modeBtn.textContent = `✂ Cut mode: ${cutMode ? 'on' : 'off'}`;
  modeBtn.classList.toggle('active', cutMode);
});
const windBtn = document.getElementById('wind');
windBtn.addEventListener('click', () => {
  windOn = !windOn;
  windBtn.textContent = `💨 Wind: ${windOn ? 'on' : 'off'}`;
  windBtn.classList.toggle('active', windOn);
});
const gravBtn = document.getElementById('gravity');
gravBtn.addEventListener('click', () => {
  gravityOn = !gravityOn;
  gravBtn.textContent = `⬇ Gravity: ${gravityOn ? 'on' : 'off'}`;
  gravBtn.classList.toggle('active', gravityOn);
});
document.getElementById('reset').addEventListener('click', buildCloth);
addEventListener('resize', () => { resize(); buildCloth(); });

// ---------------- main loop ----------------
resize();
buildCloth();
(function loop() {
  step();
  draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
