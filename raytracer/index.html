<title>Little Path Tracer — true light, one shader · Fable 5</title>
<meta name="description" content="A progressive path tracer in a single GLSL fragment shader: physically-based glass, gold and chrome, emissive lights, depth of field, ACES tone mapping — accumulating on your GPU. Built by Claude Fable 5.">

<style>
  :root {
    --ink: #ece9e2;
    --muted: #8a8fa3;

  * { margin: 0; padding: 0; box-sizing: border-box; }

    background: #08080d;

  #masthead { top: 1.4rem; left: 1.6rem; }
  #masthead .back {
    font-family: "JetBrains Mono", monospace;

<div id="scene"></div>

<div class="ui" id="masthead">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"
  }

<script type="module">
const veil = document.getElementById('veil');
const veilDetail = document.getElementById('veil-detail');

let THREE;
try {
  THREE = await import('three');
} catch (err) {
  veilDetail.textContent = 'could not reach the three.js CDN — check your connection';
  throw err;
}

/* ============================================================
   Renderer & accumulation targets
   ============================================================ */
const isMobile = matchMedia('(pointer: coarse)').matches || innerWidth < 760;
const container = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({
  antialias: false,
  preserveDrawingBuffer: true, // for PNG export
  powerPreference: 'high-performance',
});
if (!renderer.capabilities.isWebGL2) {
  veilDetail.textContent = 'this piece needs WebGL2';
  throw new Error('WebGL2 required');
}
// path tracing is per-pixel work — render slightly under native res
const RES_SCALE = isMobile ? 0.55 : 0.8;
renderer.setPixelRatio(Math.min(devicePixelRatio, 2) * RES_SCALE);
renderer.setSize(innerWidth, innerHeight);
container.appendChild(renderer.domElement);

const floatType = renderer.extensions.get('EXT_color_buffer_float')
  ? THREE.FloatType : THREE.HalfFloatType;

function makeTargets() {
  const s = renderer.getDrawingBufferSize(new THREE.Vector2());
  const opts = {
    type: floatType,
    format: THREE.RGBAFormat,
    minFilter: THREE.NearestFilter,
    magFilter: THREE.NearestFilter,
    depthBuffer: false,
    stencilBuffer: false,
  };
  return [new THREE.WebGLRenderTarget(s.x, s.y, opts), new THREE.WebGLRenderTarget(s.x, s.y, opts)];
}
let [rtA, rtB] = makeTargets();

/* ============================================================
   Scenes — JS data, generic shader
   ============================================================ */
const MAXS = 10;
// type: 0 diffuse · 1 metal · 2 glass · 3 emissive
const SCENES = [
  {
    name: 'Still Life', exposure: 1.25,
    env: { h: [0.055, 0.05, 0.062], z: [0.012, 0.015, 0.024] },
    floor: { alb: [0.06, 0.058, 0.064], rough: 0.28 },
    spheres: [
      { c: [-1.5, 1.0, -0.3], r: 1.0, alb: [0.91, 0.88, 0.82], type: 0 },
      { c: [0.45, 0.75, 1.15], r: 0.75, alb: [1.0, 0.72, 0.31], type: 1, rough: 0.14 },
      { c: [1.8, 0.92, -0.55], r: 0.92, alb: [0.96, 0.8, 0.55], type: 2, rough: 0.02, ior: 1.5 },
      { c: [-0.55, 0.42, 1.65], r: 0.42, alb: [0.92, 0.93, 0.95], type: 1, rough: 0.03 },
      { c: [0.85, 0.26, 0.35], r: 0.26, type: 3, emis: [1.0, 0.62, 0.3], pow: 5 },
      { c: [-6.5, 9.5, 5.0], r: 4.6, type: 3, emis: [1.0, 0.88, 0.7], pow: 11 },
      { c: [8.5, 6.0, -7.0], r: 3.2, type: 3, emis: [0.45, 0.62, 1.0], pow: 3.2 },
    ],
  },
  {
    name: 'Dusk', exposure: 1.12,
    env: { h: [0.47, 0.25, 0.15], z: [0.05, 0.08, 0.17] },
    floor: { alb: [0.075, 0.07, 0.066], rough: 0.45 },
    spheres: [
      { c: [0.0, 1.05, 0.0], r: 1.05, alb: [0.95, 0.95, 0.95], type: 1, rough: 0.02 },
      { c: [-2.0, 0.7, 0.9], r: 0.7, alb: [0.72, 0.33, 0.21], type: 0 },
      { c: [1.9, 0.62, 1.1], r: 0.62, alb: [0.32, 0.4, 0.52], type: 0 },
      { c: [0.6, 0.5, 2.0], r: 0.5, alb: [0.97, 0.97, 0.97], type: 2, rough: 0.0, ior: 1.5 },
      { c: [-1.0, 0.34, 2.2], r: 0.34, alb: [1.0, 0.72, 0.3], type: 1, rough: 0.1 },
      { c: [-26, 7.5, -34], r: 7.0, type: 3, emis: [1.0, 0.68, 0.42], pow: 26 },
    ],
  },
  {
    name: 'Neon', exposure: 1.35,
    env: { h: [0.012, 0.012, 0.02], z: [0.004, 0.004, 0.008] },
    floor: { alb: [0.03, 0.03, 0.036], rough: 0.12 },
    spheres: [
      { c: [0.0, 0.95, 0.0], r: 0.95, alb: [0.94, 0.94, 0.95], type: 1, rough: 0.02 },
      { c: [1.0, 0.62, 1.5], r: 0.62, alb: [0.97, 0.97, 0.97], type: 2, rough: 0.0, ior: 1.5 },
      { c: [-0.9, 0.62, 2.0], r: 0.62, alb: [0.85, 0.85, 0.85], type: 0 },
      { c: [1.7, 0.55, -0.9], r: 0.55, type: 3, emis: [1.0, 0.12, 0.42], pow: 4.2 },
      { c: [-1.7, 0.5, 0.8], r: 0.5, type: 3, emis: [0.08, 0.75, 1.0], pow: 4.2 },
      { c: [0.2, 2.7, 0.4], r: 0.4, type: 3, emis: [0.45, 0.2, 1.0], pow: 5 },
    ],
  },
];

/* ============================================================
   Shaders
   ============================================================ */
const vert = /* glsl */`
in vec3 position;
void main() { gl_Position = vec4(position, 1.0); }
`;

const traceFrag = /* glsl */`
precision highp float;
precision highp int;

uniform sampler2D uPrev;
uniform vec2 uRes;
uniform int uFrame;
uniform vec3 uCamPos, uCamRight, uCamUp, uCamFwd;
uniform float uFovScale, uAperture, uFocus;
uniform int uCount;
uniform vec4 uSph[${MAXS}];   // center xyz, radius
uniform vec4 uAlb[${MAXS}];   // albedo rgb, type
uniform vec4 uMat[${MAXS}];   // roughness, ior, -, -
uniform vec3 uEmis[${MAXS}];  // emission (pre-scaled)
uniform vec3 uEnvH, uEnvZ;
uniform vec4 uFloor;          // albedo rgb, roughness

out vec4 fragColor;

/* ---- PCG random ---- */
uint pcg(inout uint state) {
  state = state * 747796405u + 2891336453u;
  uint w = ((state >> ((state >> 28u) + 4u)) ^ state) * 277803737u;
  return (w >> 22u) ^ w;
}
float rnd(inout uint s) { return float(pcg(s)) / 4294967296.0; }

vec3 sphereDir(inout uint s) {
  float z = rnd(s) * 2.0 - 1.0;
  float a = rnd(s) * 6.2831853;
  float r = sqrt(max(0.0, 1.0 - z * z));
  return vec3(r * cos(a), r * sin(a), z);
}
vec3 cosHemi(vec3 n, inout uint s) {
  float r1 = rnd(s) * 6.2831853, r2 = rnd(s);
  float r = sqrt(r2);
  vec3 t = normalize(cross(n, abs(n.y) < 0.99 ? vec3(0, 1, 0) : vec3(1, 0, 0)));
  vec3 b = cross(n, t);
  return normalize(t * cos(r1) * r + b * sin(r1) * r + n * sqrt(1.0 - r2));
}

vec3 env(vec3 d) {
  return mix(uEnvH, uEnvZ, smoothstep(-0.05, 0.6, d.y));
}

float iSphere(vec3 ro, vec3 rd, vec4 sph) {
  vec3 oc = ro - sph.xyz;
  float b = dot(oc, rd);
  float c = dot(oc, oc) - sph.w * sph.w;
  float disc = b * b - c;
  if (disc < 0.0) return -1.0;
  float sq = sqrt(disc);
  float t = -b - sq;
  if (t < 1e-3) t = -b + sq;
  return (t < 1e-3) ? -1.0 : t;
}

vec3 radiance(vec3 ro, vec3 rd, inout uint seed) {
  vec3 col = vec3(0.0), thr = vec3(1.0);
  for (int bounce = 0; bounce < 8; bounce++) {
    // nearest hit: spheres + ground plane
    float tBest = 1e30;
    int id = -1;          // -2 floor, >=0 sphere
    if (rd.y < -1e-6) {
      float t = -ro.y / rd.y;
      if (t > 1e-3) { tBest = t; id = -2; }
    }
    for (int i = 0; i < ${MAXS}; i++) {
      if (i >= uCount) break;
      float t = iSphere(ro, rd, uSph[i]);
      if (t > 0.0 && t < tBest) { tBest = t; id = i; }
    }
    if (id == -1) { col += thr * env(rd); break; }

    vec3 p = ro + rd * tBest;
    vec3 n, alb;
    float type, rough, ior;
    if (id == -2) {
      n = vec3(0, 1, 0);
      alb = uFloor.rgb; type = 1.0; rough = uFloor.w; ior = 0.0;
    } else {
      n = (p - uSph[id].xyz) / uSph[id].w;
      alb = uAlb[id].rgb; type = uAlb[id].w;
      rough = uMat[id].x; ior = uMat[id].y;
      if (type > 2.5) { col += thr * uEmis[id]; break; }
    }

    if (type < 0.5) {                       /* diffuse */
      thr *= alb;
      vec3 nl = dot(rd, n) < 0.0 ? n : -n;
      rd = cosHemi(nl, seed);
      ro = p + nl * 2e-3;
    } else if (type < 1.5) {                /* metal */
      thr *= alb;
      vec3 nl = dot(rd, n) < 0.0 ? n : -n;
      rd = normalize(reflect(rd, nl) + rough * sphereDir(seed));
      if (dot(rd, nl) <= 0.0) break;        // absorbed into the surface
      ro = p + nl * 2e-3;
    } else {                                /* glass */
      vec3 nl = dot(rd, n) < 0.0 ? n : -n;
      bool entering = dot(rd, n) < 0.0;
      float eta = entering ? 1.0 / ior : ior;
      float cosi = -dot(rd, nl);
      vec3 refr = refract(rd, nl, eta);
      float f0 = pow((1.0 - ior) / (1.0 + ior), 2.0);
      float fres = f0 + (1.0 - f0) * pow(1.0 - cosi, 5.0);
      if (refr == vec3(0.0) || rnd(seed) < fres) {
        rd = normalize(reflect(rd, nl) + rough * sphereDir(seed));
        ro = p + nl * 2e-3;
      } else {
        thr *= alb;
        rd = normalize(refr + rough * sphereDir(seed));
        ro = p - nl * 2e-3;
      }
    }

    // russian roulette
    if (bounce > 2) {
      float q = clamp(max(thr.r, max(thr.g, thr.b)), 0.05, 0.95);
      if (rnd(seed) > q) break;
      thr /= q;
    }
  }
  return min(col, vec3(14.0)); // tame fireflies
}

void main() {
  uint seed = uint(gl_FragCoord.x) * 1973u
            + uint(gl_FragCoord.y) * 9277u
            + uint(uFrame) * 26699u + 1u;

  vec2 jit = vec2(rnd(seed), rnd(seed));
  vec2 uv = ((gl_FragCoord.xy + jit) / uRes) * 2.0 - 1.0;
  uv.x *= uRes.x / uRes.y;

  vec3 dir = normalize(uCamFwd + uFovScale * (uv.x * uCamRight + uv.y * uCamUp));

  // thin-lens depth of field
  vec3 fp = uCamPos + dir * (uFocus / dot(dir, uCamFwd));
  float ar = sqrt(rnd(seed)) * uAperture;
  float aa = rnd(seed) * 6.2831853;
  vec3 ro = uCamPos + uCamRight * (ar * cos(aa)) + uCamUp * (ar * sin(aa));
  vec3 rd = normalize(fp - ro);

  vec3 prev = uFrame > 0 ? texelFetch(uPrev, ivec2(gl_FragCoord.xy), 0).rgb : vec3(0.0);
  fragColor = vec4(prev + radiance(ro, rd, seed), 1.0);
}
`;

const viewFrag = /* glsl */`
precision highp float;
uniform sampler2D uAcc;
uniform int uFrame;
uniform float uExposure;
uniform vec2 uRes;
out vec4 fragColor;

vec3 aces(vec3 x) {
  return clamp((x * (2.51 * x + 0.03)) / (x * (2.43 * x + 0.59) + 0.14), 0.0, 1.0);
}

void main() {
  vec3 c = texelFetch(uAcc, ivec2(gl_FragCoord.xy), 0).rgb / float(max(uFrame, 1));
  c = aces(c * uExposure);
  // gentle vignette
  vec2 q = gl_FragCoord.xy / uRes;
  c *= 0.72 + 0.28 * pow(16.0 * q.x * q.y * (1.0 - q.x) * (1.0 - q.y), 0.28);
  c = pow(c, vec3(1.0 / 2.2));
  fragColor = vec4(c, 1.0);
}
`;

/* ============================================================
   Materials, fullscreen triangle
   ============================================================ */
const traceUniforms = {
  uPrev:     { value: rtA.texture },
  uRes:      { value: new THREE.Vector2() },
  uFrame:    { value: 0 },
  uCamPos:   { value: new THREE.Vector3() },
  uCamRight: { value: new THREE.Vector3() },
  uCamUp:    { value: new THREE.Vector3() },
  uCamFwd:   { value: new THREE.Vector3() },
  uFovScale: { value: Math.tan(THREE.MathUtils.degToRad(33) / 2) },
  uAperture: { value: 0.085 },
  uFocus:    { value: 7 },
  uCount:    { value: 0 },
  uSph:      { value: Array.from({ length: MAXS }, () => new THREE.Vector4()) },
  uAlb:      { value: Array.from({ length: MAXS }, () => new THREE.Vector4()) },
  uMat:      { value: Array.from({ length: MAXS }, () => new THREE.Vector4()) },
  uEmis:     { value: Array.from({ length: MAXS }, () => new THREE.Vector3()) },
  uEnvH:     { value: new THREE.Vector3() },
  uEnvZ:     { value: new THREE.Vector3() },
  uFloor:    { value: new THREE.Vector4() },
};
const viewUniforms = {
  uAcc:      { value: rtB.texture },
  uFrame:    { value: 1 },
  uExposure: { value: 1.25 },
  uRes:      { value: new THREE.Vector2() },
};

const traceMat = new THREE.RawShaderMaterial({
  glslVersion: THREE.GLSL3, uniforms: traceUniforms,
  vertexShader: vert, fragmentShader: traceFrag,
});
const viewMat = new THREE.RawShaderMaterial({
  glslVersion: THREE.GLSL3, uniforms: viewUniforms,
  vertexShader: vert, fragmentShader: viewFrag,
});

const tri = new THREE.BufferGeometry();
tri.setAttribute('position', new THREE.BufferAttribute(
  new Float32Array([-1, -1, 0, 3, -1, 0, -1, 3, 0]), 3));
const quad = new THREE.Mesh(tri, traceMat);
quad.frustumCulled = false;
const fsScene = new THREE.Scene();
fsScene.add(quad);
const dummyCam = new THREE.Camera();

/* ============================================================
   Scene loading & camera
   ============================================================ */
let sceneIdx = 0;
let frame = 0;
let paused = false;

function loadScene(i) {
  const s = SCENES[i];
  const u = traceUniforms;
  s.spheres.forEach((sp, k) => {
    u.uSph.value[k].set(...sp.c, sp.r);
    u.uAlb.value[k].set(...(sp.alb ?? [1, 1, 1]), sp.type);
    u.uMat.value[k].set(sp.rough ?? 0, sp.ior ?? 0, 0, 0);
    const e = sp.emis ?? [0, 0, 0];
    u.uEmis.value[k].set(e[0] * (sp.pow ?? 1), e[1] * (sp.pow ?? 1), e[2] * (sp.pow ?? 1));
  });
  u.uCount.value = s.spheres.length;
  u.uEnvH.value.set(...s.env.h);
  u.uEnvZ.value.set(...s.env.z);
  u.uFloor.value.set(...s.floor.alb, s.floor.rough);
  viewUniforms.uExposure.value = s.exposure;
  sceneIdx = i;
  [...panel.querySelectorAll('[data-scene]')].forEach((b, k) =>
    b.classList.toggle('active', k === i));
  resetAccum();
}

const target = new THREE.Vector3(0, 0.8, 0.2);
const cam = { az: 0.55, el: 0.32, radius: 7.2 };

function updateCamera() {
  const u = traceUniforms;
  const ce = Math.cos(cam.el);
  u.uCamPos.value.set(
    target.x + cam.radius * ce * Math.sin(cam.az),
    target.y + cam.radius * Math.sin(cam.el),
    target.z + cam.radius * ce * Math.cos(cam.az),
  );
  u.uCamFwd.value.copy(target).sub(u.uCamPos.value).normalize();
  u.uCamRight.value.crossVectors(u.uCamFwd.value, new THREE.Vector3(0, 1, 0)).normalize();
  u.uCamUp.value.crossVectors(u.uCamRight.value, u.uCamFwd.value);
  u.uFocus.value = cam.radius * 0.96; // hold focus just shy of the centre of the group
}

function resetAccum() {
  frame = 0;
  renderer.setRenderTarget(rtA); renderer.clear();
  renderer.setRenderTarget(rtB); renderer.clear();
  renderer.setRenderTarget(null);
}

/* ============================================================
   UI
   ============================================================ */
const panel = document.getElementById('panel');
SCENES.forEach((s, i) => {
  const b = document.createElement('button');
  b.textContent = s.name;
  b.dataset.scene = i;
  b.addEventListener('click', () => loadScene(i));
  panel.appendChild(b);
});
const sep = document.createElement('div');
sep.className = 'sep';
panel.appendChild(sep);

const pauseBtn = document.createElement('button');
pauseBtn.textContent = 'Pause';
pauseBtn.addEventListener('click', togglePause);
panel.appendChild(pauseBtn);

const saveBtn = document.createElement('button');
saveBtn.textContent = 'PNG';
saveBtn.addEventListener('click', savePNG);
panel.appendChild(saveBtn);

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
}
function savePNG() {
  const a = document.createElement('a');
  a.download = `path-traced-${SCENES[sceneIdx].name.toLowerCase().replace(/\s/g, '-')}-${frame}spp.png`;
  a.href = renderer.domElement.toDataURL('image/png');
  a.click();
}

/* ---- orbit (no damping: every move restarts the integral) ---- */
let dragging = false, px = 0, py = 0;
container.addEventListener('pointerdown', e => {
  dragging = true; px = e.clientX; py = e.clientY;
  container.classList.add('dragging');
  container.setPointerCapture(e.pointerId);
});
container.addEventListener('pointermove', e => {
  if (!dragging) return;
  cam.az -= (e.clientX - px) * 0.005;
  cam.el = Math.min(Math.max(cam.el + (e.clientY - py) * 0.005, 0.03), 1.35);
  px = e.clientX; py = e.clientY;
  if (paused) togglePause();
  updateCamera(); resetAccum();
});
container.addEventListener('pointerup', () => {
  dragging = false;
  container.classList.remove('dragging');
});
container.addEventListener('wheel', e => {
  e.preventDefault();
  cam.radius = Math.min(Math.max(cam.radius * (1 + e.deltaY * 0.001), 3.2), 18);
  if (paused) togglePause();
  updateCamera(); resetAccum();
}, { passive: false });

addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
  else if (e.key === 's' || e.key === 'S') savePNG();
  else {
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= SCENES.length) loadScene(n - 1);
  }
});

/* ============================================================
   Frame loop — trace into ping-pong, then tone-map to screen
   ============================================================ */
const sppEl = document.getElementById('spp');
const fpsEl = document.getElementById('fps');
const mpxEl = document.getElementById('mpx');
let frames = 0, fpsAt = performance.now();

function tick() {
  requestAnimationFrame(tick);
  if (!paused) {
    const size = renderer.getDrawingBufferSize(new THREE.Vector2());
    traceUniforms.uRes.value.copy(size);
    viewUniforms.uRes.value.copy(size);
    traceUniforms.uFrame.value = frame;
    traceUniforms.uPrev.value = rtA.texture;

    quad.material = traceMat;
    renderer.setRenderTarget(rtB);
    renderer.render(fsScene, dummyCam);

    frame++;
    viewUniforms.uFrame.value = frame;
    viewUniforms.uAcc.value = rtB.texture;

    quad.material = viewMat;
    renderer.setRenderTarget(null);
    renderer.render(fsScene, dummyCam);

    [rtA, rtB] = [rtB, rtA];
  }

  frames++;
  const now = performance.now();
  if (now - fpsAt > 600) {
    fpsEl.textContent = Math.round(frames * 1000 / (now - fpsAt));
    sppEl.textContent = frame.toLocaleString();
    frames = 0; fpsAt = now;
  }
}

addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  rtA.dispose(); rtB.dispose();
  [rtA, rtB] = makeTargets();
  const size = renderer.getDrawingBufferSize(new THREE.Vector2());
  mpxEl.textContent = (size.x * size.y / 1e6).toFixed(1);
  updateCamera(); resetAccum();
});

const size0 = renderer.getDrawingBufferSize(new THREE.Vector2());
mpxEl.textContent = (size0.x * size0.y / 1e6).toFixed(1);
updateCamera();
loadScene(0);
tick();
requestAnimationFrame(() => requestAnimationFrame(() => veil.classList.add('gone')));
</script>
</body>
