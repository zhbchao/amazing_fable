<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07070c">
<title>Sudden Death — a penalty shootout · Fable 5</title>
<meta name="description" content="A cinematic 3D penalty shootout under the floodlights: drag through the ball, bend it past the keeper, then guard the line yourself. Slow-mo replays, confetti, a synthesized crowd. Built with three.js by Claude Fable 5.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #ece9e2;
    --muted: #8a8fa3;
    --amber: #e3b264;
    --line: rgba(236, 233, 226, 0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #07070c;
    color: var(--ink);
    font-family: Inter, -apple-system, sans-serif;
    overflow: hidden;
  }
  canvas { display: block; }
  #scene { position: fixed; inset: 0; touch-action: none; }
  #scene.aim { cursor: crosshair; }

  .ui { position: fixed; z-index: 5; }
  .ui a, .ui button { pointer-events: auto; }
  .ui a { color: inherit; }

  #masthead { top: 1.4rem; left: 1.6rem; pointer-events: none; }
  #masthead .back {
    pointer-events: auto;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  #masthead .back:hover { color: var(--ink); }
  #masthead h1 {
    margin-top: 0.7rem;
    font-family: Fraunces, serif;
    font-style: italic;
    font-weight: 380;
    font-size: clamp(1.5rem, 3vw, 2.1rem);
    line-height: 1;
  }
  #masthead .sub {
    margin-top: 0.55rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #masthead .sub b { color: var(--amber); font-weight: 500; }

  #board {
    top: 1.5rem; right: 1.6rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: right;
    line-height: 2.1;
    pointer-events: none;
  }
  #board .row b { color: var(--ink); display: inline-block; min-width: 1.2ch; }
  #board .dots { letter-spacing: 0.35em; margin-left: 0.6rem; }
  #board .dots .g { color: var(--amber); }
  #board .dots .m { color: #b25f6b; }
  #board .dots .p { color: rgba(236, 233, 226, 0.22); }
  #board .round { color: var(--muted); font-size: 0.62rem; }

  #prompt {
    top: 18%; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    width: 100%;
    pointer-events: none;
  }
  #prompt.on { opacity: 1; }
  #prompt .big {
    font-family: Fraunces, serif;
    font-style: italic;
    font-weight: 380;
    font-size: clamp(2.4rem, 7vw, 5rem);
    line-height: 1.05;
    color: var(--ink);
    text-shadow: 0 4px 50px rgba(0, 0, 0, 0.85);
  }
  #prompt .big.gold { color: var(--amber); }
  #prompt.pop .big { animation: pop 0.5s cubic-bezier(0.2, 1.4, 0.4, 1) both; }
  @keyframes pop {
    from { transform: scale(0.72); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  #prompt .small {
    margin-top: 0.7rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* broadcast replay badge */
  #replay-badge {
    top: 1.6rem; left: 50%;
    transform: translateX(-50%);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.45rem 1.1rem;
    background: rgba(9, 9, 14, 0.55);
    backdrop-filter: blur(10px);
    display: none;
    pointer-events: none;
  }
  #replay-badge.on { display: block; }
  #replay-badge i {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #e25555;
    margin-right: 0.6rem;
    animation: blink 0.9s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0.15; } }

  #panel {
    bottom: 1.6rem; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.35rem;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(9, 9, 14, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #panel button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 0.5rem 0.95rem;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.25s, background 0.25s;
    white-space: nowrap;
  }
  #panel button:hover { color: var(--ink); }
  #panel button.active { color: #0a0a0d; background: var(--amber); }

  #hint {
    bottom: 1.9rem; right: 1.6rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-align: right;
    line-height: 2;
    opacity: 0.85;
    pointer-events: none;
  }

  /* goal white-out + sudden-death vignette */
  #flash {
    position: fixed; inset: 0; z-index: 8;
    background: #fff7e8;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.55s ease;
  }
  #tense {
    position: fixed; inset: 0; z-index: 7;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 52%, rgba(170, 40, 50, 0.34));
    opacity: 0;
  }
  body.tense #tense { animation: pulse 0.86s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 0.25; }
    38% { opacity: 0.85; }
    52% { opacity: 0.45; }
    62% { opacity: 0.75; }
  }

  #veil {
    position: fixed; inset: 0; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.1rem;
    background: #07070c;
    transition: opacity 1.2s ease;
  }
  #veil.gone { opacity: 0; pointer-events: none; }
  #veil .word {
    font-family: Fraunces, serif;
    font-style: italic;
    font-weight: 350;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--ink);
  }
  #veil .detail {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #veil .bar {
    width: 120px; height: 1px;
    background: var(--line);
    position: relative;
    overflow: hidden;
  }
  #veil .bar::after {
    content: "";
    position: absolute; inset: 0;
    background: var(--amber);
    transform: translateX(-100%);
    animation: sweep 1.4s ease-in-out infinite;
  }
  @keyframes sweep {
    0% { transform: translateX(-100%); }
    60% { transform: translateX(0); }
    100% { transform: translateX(100%); }
  }

  @media (max-width: 760px) {
    #hint { display: none; }
    #board { font-size: 0.6rem; }
  }
</style>
</head>
<body>

<div id="scene" class="aim"></div>
<div id="tense"></div>
<div id="flash"></div>

<div class="ui" id="masthead">
  <a class="back" href="../">← Index</a>
  <h1>Sudden Death</h1>
  <div class="sub">penalties · <b>summer 2026</b> · the cup is on</div>
</div>

<div class="ui" id="board"></div>
<div class="ui" id="replay-badge"><i></i>Replay</div>

<div class="ui" id="prompt"><div class="big" id="prompt-big"></div><div class="small" id="prompt-small"></div></div>

<div class="ui" id="panel">
  <button id="restart">New shootout</button>
  <button id="sound" class="active">Sound on</button>
</div>

<div class="ui" id="hint">
  drag through the ball to shoot · curve the drag to bend it<br>
  in goal: guard the line with your cursor
</div>

<div id="veil">
  <div class="word">Sudden Death</div>
  <div class="bar"></div>
  <div class="detail" id="veil-detail">chalking the spot</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
  }
}
</script>

<script type="module">
const veil = document.getElementById('veil');
const veilDetail = document.getElementById('veil-detail');

let THREE, EffectComposer, RenderPass, UnrealBloomPass, OutputPass;
try {
  THREE = await import('three');
  ({ EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js'));
  ({ RenderPass } = await import('three/addons/postprocessing/RenderPass.js'));
  ({ UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js'));
  ({ OutputPass } = await import('three/addons/postprocessing/OutputPass.js'));
} catch (err) {
  veilDetail.textContent = 'could not reach the three.js CDN — check your connection';
  throw err;
}

/* ============================================================
   Renderer, scene, bloom
   ============================================================ */
const container = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07070c);
scene.fog = new THREE.Fog(0x07070c, 42, 110);

const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 300);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.55, 0.65, 0.55));
composer.addPass(new OutputPass());

const SPOT = new THREE.Vector3(0, 0.11, 11);
const GOAL_W = 7.32, GOAL_H = 2.44, POST_R = 0.06;

const CAM_SHOOT = { pos: new THREE.Vector3(0, 1.9, 16.2), look: new THREE.Vector3(0, 1.5, 0) };
const CAM_SAVE  = { pos: new THREE.Vector3(0, 2.4, -5.2), look: new THREE.Vector3(0, 1.1, 11) };
let camFrom = { pos: CAM_SHOOT.pos.clone(), look: CAM_SHOOT.look.clone() };
let camTo = CAM_SHOOT, camBlend = 1;
const camLook = new THREE.Vector3().copy(CAM_SHOOT.look);
const camTrack = new THREE.Vector3();          // flight-tracking offset
let camPunch = 0;                              // kick impact

/* ---- lights ---- */
scene.add(new THREE.HemisphereLight(0x9aa3c0, 0x0a0f0a, 0.7));
const key = new THREE.DirectionalLight(0xfff3dd, 1.7);
key.position.set(-14, 22, 18);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -14; key.shadow.camera.right = 14;
key.shadow.camera.top = 18; key.shadow.camera.bottom = -6;
key.shadow.camera.far = 70;
key.shadow.bias = -0.0004;
scene.add(key);
const rim = new THREE.DirectionalLight(0xaab4dd, 0.4);
rim.position.set(12, 14, -10);
scene.add(rim);

/* ============================================================
   Pitch
   ============================================================ */
{
  const S = 2048, M = 44;
  const cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const g = cv.getContext('2d');
  const px = m => m / M * S;
  for (let i = 0; i < 12; i++) {
    g.fillStyle = i % 2 ? '#10231a' : '#13291e';
    g.fillRect(0, i * S / 12, S, S / 12);
  }
  g.strokeStyle = 'rgba(236,233,226,0.55)';
  g.lineWidth = 5;
  const cx = S / 2, gl = px(6);
  g.beginPath(); g.moveTo(0, gl); g.lineTo(S, gl); g.stroke();
  g.strokeRect(cx - px(20.16), gl, px(40.32), px(16.5));
  g.strokeRect(cx - px(9.16), gl, px(18.32), px(5.5));
  g.fillStyle = 'rgba(236,233,226,0.65)';
  g.beginPath(); g.arc(cx, gl + px(11), 7, 0, 7); g.fill();
  g.beginPath(); g.arc(cx, gl + px(11), px(9.15), Math.PI * 0.205, Math.PI * 0.795); g.stroke();
  const tex = new THREE.CanvasTexture(cv);
  tex.anisotropy = 8;
  const pitch = new THREE.Mesh(
    new THREE.PlaneGeometry(M, M),
    new THREE.MeshStandardMaterial({ map: tex, roughness: 0.92 }),
  );
  pitch.rotation.x = -Math.PI / 2;
  pitch.position.set(0, 0, M / 2 - 6);
  pitch.receiveShadow = true;
  scene.add(pitch);
  const apron = new THREE.Mesh(
    new THREE.PlaneGeometry(180, 180),
    new THREE.MeshStandardMaterial({ color: 0x0b1410, roughness: 1 }),
  );
  apron.rotation.x = -Math.PI / 2;
  apron.position.y = -0.02;
  scene.add(apron);
}

/* ============================================================
   Goal frame + verlet net
   ============================================================ */
{
  const mat = new THREE.MeshStandardMaterial({ color: 0xf2efe6, roughness: 0.35 });
  const postGeo = new THREE.CylinderGeometry(POST_R, POST_R, GOAL_H + POST_R, 12);
  for (const sx of [-1, 1]) {
    const p = new THREE.Mesh(postGeo, mat);
    p.position.set(sx * GOAL_W / 2, (GOAL_H + POST_R) / 2, 0);
    p.castShadow = true;
    scene.add(p);
  }
  const bar = new THREE.Mesh(new THREE.CylinderGeometry(POST_R, POST_R, GOAL_W + POST_R * 2, 12), mat);
  bar.rotation.z = Math.PI / 2;
  bar.position.set(0, GOAL_H, 0);
  bar.castShadow = true;
  scene.add(bar);
  for (const sx of [-1, 1]) {
    const stay = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 2.6, 8), mat);
    stay.position.set(sx * GOAL_W / 2, 1.05, -0.85);
    stay.rotation.x = 0.72;
    scene.add(stay);
  }
}

const NET_X = 26, NET_Y = 12;
const netPts = [];
for (let j = 0; j <= NET_Y; j++) {
  for (let i = 0; i <= NET_X; i++) {
    const x = -GOAL_W / 2 + (i / NET_X) * GOAL_W;
    const y = GOAL_H - (j / NET_Y) * GOAL_H;
    const z = -0.12 - (j / NET_Y) * 1.15;
    netPts.push({
      x, y, z, px: x, py: y, pz: z,
      pin: j === 0 || i === 0 || i === NET_X || j === NET_Y,
    });
  }
}
const netCons = [];
const ni = (i, j) => j * (NET_X + 1) + i;
for (let j = 0; j <= NET_Y; j++)
  for (let i = 0; i <= NET_X; i++) {
    if (i < NET_X) netCons.push([ni(i, j), ni(i + 1, j), GOAL_W / NET_X]);
    if (j < NET_Y) {
      const a = netPts[ni(i, j)], b = netPts[ni(i, j + 1)];
      netCons.push([ni(i, j), ni(i, j + 1), Math.hypot(a.y - b.y, a.z - b.z)]);
    }
  }
const netGeo = new THREE.BufferGeometry();
const netArr = new Float32Array(netCons.length * 6);
netGeo.setAttribute('position', new THREE.BufferAttribute(netArr, 3));
scene.add(new THREE.LineSegments(netGeo, new THREE.LineBasicMaterial({
  color: 0xece9e2, transparent: true, opacity: 0.4,
})));

function netStep() {
  for (const p of netPts) {
    if (p.pin) continue;
    const vx = (p.x - p.px) * 0.96, vy = (p.y - p.py) * 0.96, vz = (p.z - p.pz) * 0.96;
    p.px = p.x; p.py = p.y; p.pz = p.z;
    p.x += vx; p.y += vy - 0.001; p.z += vz;
  }
  for (let it = 0; it < 2; it++) {
    for (const [a, b, rest] of netCons) {
      const p = netPts[a], q = netPts[b];
      const dx = q.x - p.x, dy = q.y - p.y, dz = q.z - p.z;
      const d = Math.hypot(dx, dy, dz) || 1e-5;
      const f = (d - rest) / d * 0.5;
      if (!p.pin) { p.x += dx * f; p.y += dy * f; p.z += dz * f; }
      if (!q.pin) { q.x -= dx * f; q.y -= dy * f; q.z -= dz * f; }
    }
  }
  let k = 0;
  for (const [a, b] of netCons) {
    const p = netPts[a], q = netPts[b];
    netArr[k++] = p.x; netArr[k++] = p.y; netArr[k++] = p.z;
    netArr[k++] = q.x; netArr[k++] = q.y; netArr[k++] = q.z;
  }
  netGeo.attributes.position.needsUpdate = true;
}
function netImpulse(x, y, vx, vy, vz, mult = 1) {
  for (const p of netPts) {
    if (p.pin) continue;
    const d = Math.hypot(p.x - x, p.y - y);
    if (d < 1.1) {
      const w = (1 - d / 1.1) * 0.16 * mult;
      p.px -= vx * w * 0.016; p.py -= vy * w * 0.016; p.pz -= vz * w * 0.016;
    }
  }
}

/* ============================================================
   Stadium: crowd-textured stands, floodlights, light shafts
   ============================================================ */
{
  // crowd texture: thousands of head-dots in banked rows
  const cw = 1024, ch = 512;
  const cc = document.createElement('canvas');
  cc.width = cw; cc.height = ch;
  const g = cc.getContext('2d');
  g.fillStyle = '#08090e';
  g.fillRect(0, 0, cw, ch);
  for (let row = 0; row < 30; row++) {
    const y = 20 + row * 16;
    for (let x = 6 + (row % 2) * 5; x < cw; x += 9 + Math.random() * 3) {
      const v = 14 + Math.random() * 22;
      g.fillStyle = `rgb(${v + Math.random() * 16},${v},${v + Math.random() * 9})`;
      g.beginPath(); g.arc(x, y + Math.random() * 5, 2.1, 0, 7); g.fill();
    }
  }
  const crowdTex = new THREE.CanvasTexture(cc);
  crowdTex.wrapS = THREE.RepeatWrapping;
  const mkStand = (w, h, x, z, ry, rep) => {
    // unlit: the crowd stays a dark murmur, never catches the floodlights
    const map = crowdTex.clone();
    map.repeat.set(rep, 1);
    map.wrapS = THREE.RepeatWrapping;
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshBasicMaterial({ map, fog: true }));
    m.position.set(x, h / 2 + 1.2, z);
    m.rotation.y = ry;
    m.rotation.x = -0.12;
    scene.add(m);
    // roof line
    const roof = new THREE.Mesh(new THREE.BoxGeometry(w + 2, 0.5, 1.2),
      new THREE.MeshBasicMaterial({ color: 0x0c0d13 }));
    roof.position.set(x, h + 1.6, z);
    roof.rotation.y = ry;
    scene.add(roof);
  };
  mkStand(64, 13, 0, -9.5, 0, 2);
  mkStand(70, 12, -26, 18, Math.PI / 2, 2.2);
  mkStand(70, 12, 26, 18, -Math.PI / 2, 2.2);

  const towerMat = new THREE.MeshStandardMaterial({ color: 0x14151c, roughness: 0.8 });
  const glowTex = (() => {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const gg = c.getContext('2d');
    const r = gg.createRadialGradient(64, 64, 4, 64, 64, 62);
    r.addColorStop(0, 'rgba(255,243,214,1)');
    r.addColorStop(0.25, 'rgba(255,243,214,0.5)');
    r.addColorStop(1, 'rgba(255,243,214,0)');
    gg.fillStyle = r; gg.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(c);
  })();
  for (const [tx, tz] of [[-21, -6], [21, -6], [-21, 26], [21, 26]]) {
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.26, 19, 8), towerMat);
    pole.position.set(tx, 9.5, tz);
    scene.add(pole);
    const head = new THREE.Mesh(
      new THREE.BoxGeometry(2.6, 1.1, 0.4),
      new THREE.MeshBasicMaterial({ color: 0xfff3d6 }),
    );
    head.position.set(tx, 19.2, tz);
    head.lookAt(0, 0, 8);
    scene.add(head);
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTex, transparent: true, opacity: 0.95, depthWrite: false,
    }));
    glow.scale.setScalar(9);
    glow.position.copy(head.position);
    scene.add(glow);
    // volumetric-ish light shaft
    const shaftLen = 24;
    const shaft = new THREE.Mesh(
      new THREE.ConeGeometry(4.6, shaftLen, 24, 1, true),
      new THREE.MeshBasicMaterial({
        color: 0xfff3d6, transparent: true, opacity: 0.012,
        side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
      }),
    );
    const target = new THREE.Vector3(tx * 0.2, 0, 8 + tz * 0.15);
    const mid = head.position.clone().lerp(target, 0.5);
    shaft.position.copy(mid);
    shaft.lookAt(target);
    shaft.rotateX(-Math.PI / 2);
    scene.add(shaft);
  }
}

/* ---- crowd camera flashes ---- */
const flashUniforms = { uTime: { value: 0 }, uBoost: { value: 1 } };
{
  const n = 900, p = new Float32Array(n * 3), seed = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const which = Math.random();
    if (which < 0.4) {
      p[i * 3] = (Math.random() - 0.5) * 60;

    uniforms: flashUniforms,

    vertexShader: `
      attribute float aSeed;

  })));

let actx = null, crowdGain = null, soundOn = true, heartbeatIv = null;
function audioInit() {
  if (actx || !soundOn) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const len = actx.sampleRate * 2;
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    last = (last + (Math.random() * 2 - 1) * 0.02) * 0.998;
    d[i] = last * 18;
  }
  const src = actx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const lp = actx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 420;
  crowdGain = actx.createGain();
  crowdGain.gain.value = 0.05;
  src.connect(lp).connect(crowdGain).connect(actx.destination);
  src.start();
}
function swell(amount, secs) {
  if (!actx) return;
  const t = actx.currentTime;
  crowdGain.gain.cancelScheduledValues(t);
  crowdGain.gain.setTargetAtTime(amount, t, 0.06);
  crowdGain.gain.setTargetAtTime(0.05, t + secs * 0.4, secs * 0.5);
}
function blip(freq, dur, type = 'triangle', vol = 0.06, slide = 0) {
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(actx.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
function setHeartbeat(on) {
  document.body.classList.toggle('tense', on);
  if (on && !heartbeatIv) {
    heartbeatIv = setInterval(() => {
      blip(54, 0.14, 'sine', 0.14, -10);
      setTimeout(() => blip(48, 0.12, 'sine', 0.1, -8), 160);
    }, 860);
  } else if (!on && heartbeatIv) {
    clearInterval(heartbeatIv);
    heartbeatIv = null;
  }
}

function decided() {
  const ys = scoreOf(G.you), as = scoreOf(G.ai);
  if (G.round <= 5) {
    const yLeft = 5 - G.you.length, aLeft = 5 - G.ai.length;
    if (ys > as + aLeft || as > ys + yLeft) return true;
    if (G.you.length === 5 && G.ai.length === 5 && ys !== as) return true;
    return false;
  }
  return G.you.length === G.ai.length && ys !== as;
}
function decisiveKick() {
  const ys = scoreOf(G.you), as = scoreOf(G.ai);
  const yLeft = 5 - G.you.length, aLeft = 5 - G.ai.length;
  return G.round > 5 || ys + yLeft === as || as + aLeft === ys + 1;
}

function finish() {
  G.state = 'over';
  setHeartbeat(false);
  const ys = scoreOf(G.you), as = scoreOf(G.ai);
  container.classList.remove('aim');
  glove.visible = false;
  if (ys > as) {
    prompt('You win the shootout', `${ys} — ${as} · the crowd erupts`, true, 0);
    sfx.roar(); sfx.whistle();
    whiteFlash();
    spawnConfetti(0, 2.5, 5, 420);
    celebration();
  } else {
    prompt('The keeper takes it', `${ys} — ${as} · heartbreak from twelve yards`, false, 0);
    sfx.groan(); sfx.whistle();
  }
}

let drag = null;
container.addEventListener('pointerdown', e => {
  audioInit();
  if (G.state === 'aim') drag = [{ x: e.clientX, y: e.clientY, t: performance.now() }];
});
container.addEventListener('pointermove', e => {
  if (drag && G.state === 'aim') drag.push({ x: e.clientX, y: e.clientY, t: performance.now() });
  if (G.state === 'saveWait' || G.state === 'saveFlight') {
    const nx = (e.clientX / innerWidth) * 2 - 1;
    const ny = -(e.clientY / innerHeight) * 2 + 1;
    ray.setFromCamera({ x: nx, y: ny }, camera);
    ray.ray.intersectPlane(goalPlane, gloveTarget);
    gloveTarget.x = THREE.MathUtils.clamp(gloveTarget.x, -GOAL_W / 2, GOAL_W / 2);
    gloveTarget.y = THREE.MathUtils.clamp(gloveTarget.y, 0.3, GOAL_H + 0.2);
  }
});
container.addEventListener('pointerup', () => {
  if (!drag || G.state !== 'aim') { drag = null; return; }
  const a = drag[0], b = drag[drag.length - 1];
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.hypot(dx, dy);
  if (len < 36 || dy > -8) { drag = null; return; }
  const mid = drag[Math.floor(drag.length / 2)];
  const cross = ((mid.x - a.x) * dy - (mid.y - a.y) * dx) / (len || 1);
  const curl = THREE.MathUtils.clamp(cross / 90, -1, 1);
  const speed = len / Math.max(b.t - a.t, 60);
  const power = THREE.MathUtils.clamp((speed - 0.25) / 1.9, 0, 1);
  let tx = (dx / innerWidth) * 13.5;
  let ty = 0.15 + (-dy / innerHeight) * 6.8;
  tx += (Math.random() - 0.5) * 0.85 * power;
  ty += (Math.random() - 0.5) * 0.7 * power;
  ty = Math.max(ty, 0.05);
  shoot(tx, ty, power, curl);
  drag = null;
});

function shoot(tx, ty, power, curl) {
  G.state = 'flight';
  container.classList.remove('aim');
  sfx.kick();
  camPunch = 1;
  trailReset(SPOT);
  const T = THREE.MathUtils.lerp(1.2, 0.72, power);
  const read = Math.random() < 0.34 + G.round * 0.045 + (Math.abs(tx) < 1.2 ? 0.22 : 0);
  const sideGuess = read ? Math.sign(tx) || (Math.random() < 0.5 ? -1 : 1)
                         : [-1, 0, 1][(Math.random() * 3) | 0];
  const hiGuess = read ? ty > 1.3 : Math.random() < 0.4;
  const divePoint = new THREE.Vector2(sideGuess * 2.45, hiGuess ? 1.85 : 0.75);
  G.keeperDive = { side: sideGuess, hi: hiGuess, t0: null };
  G.flight = {
    t: 0, T, tx, ty, curl: curl * 2.1, power,
    from: SPOT.clone(), mine: true, divePoint,
    slow: decisiveKick(),
  };
}

   ============================================================ */
function flightPos(f, tt) {
  const u = tt / f.T;
  const x = f.from.x + (f.tx - f.from.x) * u + f.curl * Math.sin(Math.PI * u);
  const vy0 = ((f.ty - f.from.y) + 4.9 * f.T * f.T) / f.T;
  const y = f.from.y + vy0 * tt - 4.9 * tt * tt;
  const z = f.from.z + (0.05 - f.from.z) * u;
  return new THREE.Vector3(x, y, z);
}

function resolveShot(f) {
  const hitPost = Math.abs(Math.abs(f.tx) - GOAL_W / 2) < 0.14 && f.ty < GOAL_H + 0.1;
  const hitBar = Math.abs(f.ty - GOAL_H) < 0.12 && Math.abs(f.tx) < GOAL_W / 2 + 0.1;
  const onTarget = Math.abs(f.tx) < GOAL_W / 2 - 0.09 && f.ty < GOAL_H - 0.07;
  if (hitPost || hitBar) return 'woodwork';
  if (!onTarget) return 'off';
  if (f.mine) {
    const reach = 1.12 + (1 - f.power) * 0.55;
    const d = Math.hypot(f.tx - f.divePoint.x, f.ty - f.divePoint.y);
    return d < reach ? 'saved' : 'goal';
  } else {
    const d = Math.hypot(f.tx - glove.position.x, f.ty - glove.position.y);
    return d < 1.18 ? 'saved' : 'goal';
  }
}

function settleKick(outcome, f) {
  const scored = outcome === 'goal';
  if (f.mine) G.you.push(scored); else G.ai.push(scored);
  updateBoard();
  if (scored) {
    if (f.mine) {
      sfx.roar(); whiteFlash();
      spawnConfetti(f.tx, 2.2, 1.5, 260);
      prompt('GOAL', placeWord(f), true);
    } else {
      sfx.groan();
      prompt('They score', 'beaten at the ' + (f.ty > 1.4 ? 'top' : 'bottom'), false);
    }
  } else if (outcome === 'saved') {
    if (f.mine) { sfx.groan(); prompt('SAVED', 'the keeper read it', false); }
    else { sfx.save(); whiteFlash(); spawnConfetti(glove.position.x, 1.6, 1.5, 160); prompt('WHAT A SAVE', 'gloves like magnets', true); }
  } else if (outcome === 'woodwork') {
    sfx.ping(); after(250, () => sfx.groan());
    camPunch = 1.6;
    prompt(f.ty > GOAL_H - 0.2 ? 'OFF THE BAR' : 'OFF THE POST', 'millimetres', false);
  } else {
    sfx.groan();
    prompt(f.ty > GOAL_H ? 'OVER' : 'WIDE', f.mine ? 'row z' : 'they blaze it wide', false);
  }
  // broadcast replay for anything dramatic
  const replayWorthy = scored || outcome === 'woodwork' || (outcome === 'saved' && !f.mine);
  if (replayWorthy) {
    const repMs = (f.T * 0.7 / 0.3) * 1000;   // replay covers 70% of flight at 0.3x
    after(1100, () => startReplay(f, outcome));
    after(1100 + repMs + 450, nextKick);
  } else {
    after(1900, nextKick);
  }
}
function placeWord(f) {
  const side = f.tx < -1.4 ? 'left' : f.tx > 1.4 ? 'right' : 'centre';
  const h = f.ty > 1.5 ? 'top' : 'low';
  return `${h} ${side} · ${Math.round(60 + f.power * 65)} km/h`;
}

/* ============================================================
   Broadcast replay
   ============================================================ */
const replayBadge = document.getElementById('replay-badge');
function startReplay(f, outcome) {
  if (G.state === 'over') return;
  G.replay = {
    f, outcome,
    t: f.T * 0.3,            // pick the action up just before the strike arrives
    speed: 0.3,
  };
  replayBadge.classList.add('on');
  promptEl.classList.remove('on');
  // a low camera by the post on the far side from the ball's destination
  const side = Math.sign(f.tx) || 1;
  G.replay.cam = {
    pos: new THREE.Vector3(-side * (GOAL_W / 2 + 0.8), 0.9, -1.6),
    look: new THREE.Vector3(f.tx * 0.4, Math.max(f.ty * 0.7, 0.6), 6),
  };
  trailReset(flightPos(f, G.replay.t));
}
function endReplay() {
  if (!G.replay) return;
  const { f, outcome } = G.replay;
  G.replay = null;
  replayBadge.classList.remove('on');
  trail.visible = false;
  camFrom = snapCam();
  camBlend = 0;           // glide back to the live camera
  if (outcome === 'goal') netImpulse(f.tx, f.ty, (f.tx - f.from.x) / f.T, 0, -11 / f.T, 0.5);
}

/* ============================================================
   UI buttons
   ============================================================ */
document.getElementById('restart').addEventListener('click', () => {
  audioInit();
  clearTimers();
  G.you = []; G.ai = []; G.round = 1;
  G.flight = null; G.replay = null; G.runup = null;
  replayBadge.classList.remove('on');
  promptEl.classList.remove('on');
  startShoot();
});
const soundBtn = document.getElementById('sound');
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? 'Sound on' : 'Sound off';
  soundBtn.classList.toggle('active', soundOn);
  if (!soundOn && actx) actx.suspend();
  else if (actx) actx.resume();
  else audioInit();
});

/* ============================================================
   Camera helper
   ============================================================ */
function snapCam() { return { pos: camera.position.clone(), look: camLook.clone() }; }

/* ============================================================
   Frame loop
   ============================================================ */
const clock = new THREE.Clock();
let timeScale = 1;

function tick() {
  requestAnimationFrame(tick);
  const raw = Math.min(clock.getDelta(), 0.05);
  const now = performance.now();

  // slow motion on decisive flights
  const targetScale = (G.flight && G.flight.slow && G.flight.t / G.flight.T > 0.4) ? 0.32 : 1;
  timeScale += (targetScale - timeScale) * 0.14;
  const dt = raw * timeScale;

  flashUniforms.uTime.value = now * 0.001;
  flashUniforms.uBoost.value += (1 - flashUniforms.uBoost.value) * 0.02;
  camPunch *= 1 - 6 * raw;

  /* ---- replay owns the camera entirely ---- */
  if (G.replay) {
    const r = G.replay;
    r.t += raw * r.speed;
    const f = r.f;
    if (r.t >= f.T) {
      endReplay();
    } else {
      const p = flightPos(f, r.t);
      ball.position.copy(p);
      ball.rotation.x -= raw * 5;
      trailPush(p);
      camera.position.lerp(r.cam.pos, 0.12);
      camLook.lerp(r.cam.look, 0.12);
      camera.lookAt(camLook);
    }
    netStep();
    confettiStep(raw, now);
    fireworksStep(raw);
    composer.render();
    return;
  }

  // live camera
  camBlend = Math.min(camBlend + raw * 1.4, 1);
  const e = camBlend * camBlend * (3 - 2 * camBlend);
  camera.position.lerpVectors(camFrom.pos, camTo.pos, e);
  camLook.lerpVectors(camFrom.look, camTo.look, e);
  // flight tracking: lean toward where the ball is going
  if (G.flight && G.flight.mine) {
    const f = G.flight, u = f.t / f.T;
    camTrack.lerp(new THREE.Vector3(f.tx * 0.22, f.ty * 0.12, -2.4 * u), 0.09);
  } else {
    camTrack.lerp(new THREE.Vector3(), 0.06);
  }
  camera.position.add(camTrack);
  camera.position.x += Math.sin(now * 0.0004) * 0.08;
  camera.position.z += camPunch * 0.18;
  camera.lookAt(camLook);

  // glove
  if (glove.visible) {
    glove.position.lerp(gloveTarget, 0.3);
    glove.material.opacity = 0.7 + Math.sin(now * 0.006) * 0.25;
  }

  // keeper dive — anticipate, leap, land
  if (G.flight && G.flight.mine && G.keeperDive && G.keeperDive.t0 === null
      && G.flight.t / G.flight.T > 0.18) {
    G.keeperDive.t0 = now;
  }
  if (G.keeperDive?.t0 !== null && G.keeperDive && keeper.visible) {
    const k = G.keeperDive;
    const t = (now - k.t0) / 1000;
    const arms = keeper.userData.arms;
    if (t < 0.1) {
      keeper.position.y = -0.08 * (t / 0.1);             // crouch
    } else if (k.side === 0) {
      keeper.position.y = Math.min((t - 0.1) * 3, 1) * (k.hi ? 0.55 : 0.05);  // jump straight up
      arms[0].rotation.z = THREE.MathUtils.lerp(arms[0].rotation.z, -2.7, 0.2);
      arms[1].rotation.z = THREE.MathUtils.lerp(arms[1].rotation.z, 2.7, 0.2);
    } else {
      const u = Math.min((t - 0.1) / 0.38, 1);
      const eo = 1 - (1 - u) * (1 - u);                  // ease-out leap
      keeper.position.x = k.side * 2.1 * eo;
      keeper.position.y = (k.hi ? 1.0 : 0.45) * Math.sin(Math.PI * Math.min(u * 1.15, 1)) - 0.45 * Math.max(u - 0.85, 0) * 6;
      keeper.position.y = Math.max(keeper.position.y, k.hi ? 0.12 : 0.04);
      keeper.rotation.z = -k.side * (k.hi ? 1.35 : 1.0) * eo;
      arms[0].rotation.z = THREE.MathUtils.lerp(arms[0].rotation.z, -2.8, 0.25);
      arms[1].rotation.z = THREE.MathUtils.lerp(arms[1].rotation.z, 2.8, 0.25);
    }
  } else if (keeper.visible) {
    keeper.position.y = Math.sin(now * 0.003) * 0.02;
    keeper.userData.arms[0].rotation.z = -0.5 + Math.sin(now * 0.0018) * 0.06;
    keeper.userData.arms[1].rotation.z = 0.5 - Math.sin(now * 0.0018) * 0.06;
  }

  // kicker: idle sway, then the run-up
  if (kicker.visible && G.state === 'saveWait') {
    if (G.runup) {
      G.runup.t += raw;
      const u = Math.min(G.runup.t / G.runup.dur, 1);
      kicker.position.lerpVectors(new THREE.Vector3(1.9, 0, 14.6), new THREE.Vector3(0.3, 0, 11.5), u * u * (3 - 2 * u));
      const stride = Math.sin(u * Math.PI * 5);
      kicker.userData.legs[0].rotation.x = stride * 0.7;
      kicker.userData.legs[1].rotation.x = -stride * 0.7;
      kicker.rotation.y = Math.PI + 0.12 * Math.sin(u * Math.PI);
      if (u >= 1) {
        kicker.userData.legs[1].rotation.x = -1.15;       // the strike
        G.runup = null;
        aiShoot();
      }
    } else {
      kicker.position.z = 14.6 + Math.sin(now * 0.002) * 0.1;
    }
  }
  if (kicker.visible && G.state === 'saveFlight') {
    kicker.userData.legs[1].rotation.x += (0.35 - kicker.userData.legs[1].rotation.x) * 0.08;
  }

  // ball flight
  if (G.flight) {
    const f = G.flight;
    f.t += dt;
    if (f.t >= f.T) {
      const outcome = resolveShot(f);
      const v = flightPos(f, f.T).sub(flightPos(f, f.T - 0.016)).divideScalar(0.016);
      G.flight = null;
      G.state = 'result';
      timeScale = 1;
      if (outcome === 'goal') {
        ball.position.set(f.tx, Math.max(f.ty, 0.12), -0.55);
        netImpulse(f.tx, f.ty, v.x, v.y, v.z);
      } else if (outcome === 'woodwork') {
        ball.position.set(f.tx * 0.92, Math.max(f.ty * 0.8, 0.12), 1.6);
      } else if (outcome === 'saved') {
        ball.position.set(f.mine ? f.divePoint.x * 1.25 : glove.position.x * 1.2, 0.12, 2.6);
      } else {
        ball.position.set(f.tx * 1.05, Math.max(f.ty, 0.12), -2.4);
      }
      trail.visible = false;
      settleKick(outcome, f);
    } else {
      const p = flightPos(f, f.t);
      ball.position.copy(p);
      ball.rotation.x -= dt * 14;
      ball.rotation.y += f.curl * dt * 6;
      trailPush(p);
    }
  }

  netStep();
  confettiStep(raw, now);
  fireworksStep(raw);
  composer.render();
}

/* ============================================================
   Boot
   ============================================================ */
updateBoard();
camera.position.copy(CAM_SHOOT.pos);
camera.lookAt(CAM_SHOOT.look);
ball.position.copy(SPOT);
tick();
requestAnimationFrame(() => requestAnimationFrame(() => {
  veil.classList.add('gone');
  startShoot();
}));

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
