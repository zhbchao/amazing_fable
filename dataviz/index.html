<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capability Graph — live force layout · Fable 5</title>
<meta name="theme-color" content="#07070c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #ece9e2;
    --muted: #8a8fa3;
    --amber: #e3b264;
    --line: rgba(236, 233, 226, 0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #07070c;
    color: var(--ink);
    font-family: Inter, -apple-system, sans-serif;
    overflow: hidden;
  }
  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }

  .ui { position: fixed; z-index: 5; }
  #masthead { top: 1.4rem; left: 1.6rem; pointer-events: none; }
  #masthead .back {
    pointer-events: auto;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  #masthead .back:hover { color: var(--ink); }
  #masthead h1 {
    margin-top: 0.7rem;
    font-family: Fraunces, serif;
    font-style: italic;
    font-weight: 380;
    font-size: clamp(1.5rem, 3vw, 2.1rem);
    line-height: 1;
  }
  #masthead .sub {
    margin-top: 0.55rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #masthead .sub b { color: var(--amber); font-weight: 500; }

  #hint {
    bottom: 1.9rem; right: 1.6rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-align: right;
    line-height: 2;
    opacity: 0.85;
    pointer-events: none;
  }

  #legend {
    bottom: 1.6rem; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 1.1rem;
    padding: 0.6rem 1.2rem;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(9, 9, 14, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #legend span { display: inline-flex; align-items: center; gap: 0.45rem; white-space: nowrap; }
  #legend i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  @media (max-width: 760px) {
    #hint { display: none; }
    #legend { max-width: 94vw; overflow-x: auto; scrollbar-width: none; }
    #legend::-webkit-scrollbar { display: none; }
  }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>

<div class="ui" id="masthead">
  <a class="back" href="../">← Index</a>
  <h1>Capability Graph</h1>
  <div class="sub">springs · repulsion · <b>every</b> frame</div>
</div>

<div class="ui" id="hint">
  drag nodes to rearrange<br>
  hover to trace connections
</div>

<div class="ui" id="legend"></div>

<script>
'use strict';
// ============================================================
//  Force-directed graph from scratch: spring forces on edges,
//  inverse-square charge repulsion between all node pairs,
//  velocity Verlet integration, interactive dragging.
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

const GROUPS = {
  hub:       { color: '#e3b264', label: null },
  coding:    { color: '#2dd4bf', label: 'Coding' },
  reasoning: { color: '#60a5fa', label: 'Reasoning' },
  creative:  { color: '#f472b6', label: 'Creative' },
  agents:    { color: '#fb923c', label: 'Agentic' },
  analysis:  { color: '#facc15', label: 'Analysis' },
  comms:     { color: '#4ade80', label: 'Communication' }
};

const DATA = {
  name: 'Claude Fable 5',
  children: [
    { group: 'coding',    name: 'Coding',        leaves: ['Full-stack apps', 'Debugging', 'Code review', 'Refactoring', '50+ languages'] },
    { group: 'reasoning', name: 'Reasoning',     leaves: ['Mathematics', 'Logic puzzles', 'Long-horizon planning', 'Step-by-step proofs'] },
    { group: 'creative',  name: 'Creative',      leaves: ['Fiction & poetry', 'Game design', 'Generative art', 'Worldbuilding'] },
    { group: 'agents',    name: 'Agentic',       leaves: ['Tool use', 'Computer use', 'Multi-step tasks', 'MCP integrations'] },
    { group: 'analysis',  name: 'Analysis',      leaves: ['Data visualization', 'Research synthesis', 'Vision & documents', 'Forecast modeling'] },
    { group: 'comms',     name: 'Communication', leaves: ['Translation', 'Summarization', 'Teaching', 'Technical writing'] }
  ]
};

// ---- build node / edge lists ----
const nodes = [], edges = [];
function addNode(name, group, kind) {
  nodes.push({
    name, group, kind,
    x: 0, y: 0, vx: 0, vy: 0,
    r: kind === 'hub' ? 30 : kind === 'cat' ? 16 : 7
  });
  return nodes.length - 1;
}
const hubIdx = addNode(DATA.name, 'hub', 'hub');
for (const cat of DATA.children) {
  const ci = addNode(cat.name, cat.group, 'cat');
  edges.push({ a: hubIdx, b: ci, rest: 170 });
  for (const leaf of cat.leaves) {
    const li = addNode(leaf, cat.group, 'leaf');
    edges.push({ a: ci, b: li, rest: 78 });
  }
}
// a few cross-links to make the layout interesting
function link(n1, n2, rest) {
  const a = nodes.findIndex(n => n.name === n1);
  const b = nodes.findIndex(n => n.name === n2);
  if (a > -1 && b > -1) edges.push({ a, b, rest });
}
link('Generative art', 'Data visualization', 130);
link('Game design', 'Full-stack apps', 130);
link('Multi-step tasks', 'Long-horizon planning', 130);
link('Technical writing', 'Code review', 130);

function scatter() {
  for (let i = 0; i < nodes.length; i++) {
    const a = i / nodes.length * Math.PI * 2;
    const r = nodes[i].kind === 'hub' ? 0 : nodes[i].kind === 'cat' ? 140 : 240;
    nodes[i].x = W / 2 + Math.cos(a) * r + (Math.random() - 0.5) * 40;
    nodes[i].y = H / 2 + Math.sin(a) * r + (Math.random() - 0.5) * 40;
  }
}

// ---- physics ----
function step() {
  // charge repulsion, O(n^2) — fine for this graph size
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let d2 = dx * dx + dy * dy;
      if (d2 < 1) { dx = Math.random() - 0.5; dy = Math.random() - 0.5; d2 = 1; }
      const d = Math.sqrt(d2);
      const f = Math.min(12, 5200 / d2);
      const fx = dx / d * f, fy = dy / d * f;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }
  // springs
  for (const e of edges) {
    const a = nodes[e.a], b = nodes[e.b];
    const dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.hypot(dx, dy) || 1;
    const f = (d - e.rest) * 0.012;
    const fx = dx / d * f, fy = dy / d * f;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  }
  // gentle pull to center + integrate
  for (const n of nodes) {
    n.vx += (W / 2 - n.x) * 0.0012;
    n.vy += (H / 2 - n.y) * 0.0012;
    if (n === dragNode) { n.vx = 0; n.vy = 0; continue; }
    n.vx *= 0.86; n.vy *= 0.86;
    n.x += n.vx; n.y += n.vy;
    n.x = Math.max(n.r + 4, Math.min(W - n.r - 4, n.x));
    n.y = Math.max(n.r + 4, Math.min(H - n.r - 4, n.y));
  }
}

// ---- render ----
let hoverNode = null;
function neighbors(n) {
  const set = new Set([n]);
  for (const e of edges) {
    if (nodes[e.a] === n) set.add(nodes[e.b]);
    if (nodes[e.b] === n) set.add(nodes[e.a]);
  }
  return set;
}

function draw() {
  ctx.fillStyle = '#07070c';
  ctx.fillRect(0, 0, W, H);
  const hl = hoverNode ? neighbors(hoverNode) : null;

  // edges
  for (const e of edges) {
    const a = nodes[e.a], b = nodes[e.b];
    const lit = hl && hl.has(a) && hl.has(b) && (a === hoverNode || b === hoverNode);
    ctx.strokeStyle = lit
      ? GROUPS[(a.kind === 'leaf' ? a : b).group].color
      : 'rgba(236,233,226,0.13)';
    ctx.lineWidth = lit ? 1.8 : 1;
    ctx.globalAlpha = hl && !lit ? 0.35 : 1;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // nodes
  for (const n of nodes) {
    const c = GROUPS[n.group].color;
    const dim = hl && !hl.has(n);
    ctx.globalAlpha = dim ? 0.25 : 1;
    ctx.shadowColor = c;
    ctx.shadowBlur = n === hoverNode ? 24 : n.kind === 'hub' ? 18 : 8;
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    if (n.kind !== 'leaf') {
      ctx.fillStyle = 'rgba(7,7,12,0.85)';
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r - 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // labels
  ctx.textAlign = 'center';
  for (const n of nodes) {
    const dim = hl && !hl.has(n);
    if (n.kind === 'hub') {
      ctx.fillStyle = '#ece9e2';
      ctx.font = 'italic 500 14px Fraunces, serif';
      ctx.fillText('Claude', n.x, n.y - 3);
      ctx.fillText('Fable 5', n.x, n.y + 12);
    } else if (n.kind === 'cat') {
      ctx.globalAlpha = dim ? 0.3 : 1;
      ctx.fillStyle = GROUPS[n.group].color;
      ctx.font = '500 11px "JetBrains Mono", monospace';
      ctx.fillText(n.name.toUpperCase(), n.x, n.y - n.r - 8);
    } else {
      const lit = hl && hl.has(n);
      ctx.globalAlpha = hl ? (lit ? 1 : 0.15) : 0.65;
      ctx.fillStyle = lit ? '#ece9e2' : '#a8a8b2';
      ctx.font = `${lit ? '600 ' : ''}11px Inter, sans-serif`;
      ctx.fillText(n.name, n.x, n.y - n.r - 5);
    }
    ctx.globalAlpha = 1;
  }
}

// ---- input ----
let dragNode = null;
function pick(x, y) {
  let best = null, bd = 1e9;
  for (const n of nodes) {
    const d = (n.x - x) ** 2 + (n.y - y) ** 2;
    if (d < Math.max(n.r + 12, 18) ** 2 && d < bd) { bd = d; best = n; }
  }
  return best;
}
function pos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - rect.left, src.clientY - rect.top];
}
canvas.addEventListener('mousedown', e => { const [x, y] = pos(e); dragNode = pick(x, y); });
canvas.addEventListener('mousemove', e => {
  const [x, y] = pos(e);
  if (dragNode) { dragNode.x = x; dragNode.y = y; }
  else hoverNode = pick(x, y);
  canvas.style.cursor = (dragNode || hoverNode) ? 'grab' : 'default';
});
addEventListener('mouseup', () => { dragNode = null; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); const [x, y] = pos(e); dragNode = pick(x, y); hoverNode = dragNode; }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const [x, y] = pos(e); if (dragNode) { dragNode.x = x; dragNode.y = y; } }, { passive: false });
canvas.addEventListener('touchend', () => { dragNode = null; hoverNode = null; });

// ---- legend ----
document.getElementById('legend').innerHTML = Object.values(GROUPS)
  .filter(g => g.label)
  .map(g => `<span><i style="background:${g.color}"></i>${g.label}</span>`)
  .join('');

// ---- main ----
function resize() {
  DPR = Math.min(devicePixelRatio || 1, 2);
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
addEventListener('resize', resize);
resize();
scatter();
(function loop() {
  step();
  draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
