<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Fields — particles painting · Fable 5</title>
<meta name="theme-color" content="#07070c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #ece9e2;
    --muted: #8a8fa3;
    --amber: #e3b264;
    --line: rgba(236, 233, 226, 0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #07070c;
    color: var(--ink);
    font-family: Inter, -apple-system, sans-serif;
    overflow: hidden;
  }
  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: pointer; }

  .ui { position: fixed; z-index: 5; }
  #masthead { top: 1.4rem; left: 1.6rem; pointer-events: none; }
  #masthead .back {
    pointer-events: auto;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  #masthead .back:hover { color: var(--ink); }
  #masthead h1 {
    margin-top: 0.7rem;
    font-family: Fraunces, serif;
    font-style: italic;
    font-weight: 380;
    font-size: clamp(1.5rem, 3vw, 2.1rem);
    line-height: 1;
  }
  #masthead .sub {
    margin-top: 0.55rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #masthead .sub b { color: var(--amber); font-weight: 500; }

  #info {
    top: 1.5rem; right: 1.6rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: right;
    line-height: 1.9;
    pointer-events: none;
  }
  #info b { color: var(--ink); font-weight: 500; }

  #hint {
    bottom: 1.9rem; right: 1.6rem;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-align: right;
    line-height: 2;
    opacity: 0.85;
    pointer-events: none;
  }

  #panel {
    bottom: 1.6rem; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.35rem;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(9, 9, 14, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #panel button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 0.5rem 0.95rem;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.25s, background 0.25s;
    white-space: nowrap;
  }
  #panel button:hover { color: var(--ink); }
  #panel .sep { width: 1px; height: 1.1rem; background: var(--line); margin: 0 0.3rem; }

  @media (max-width: 760px) {
    #hint, #info { display: none; }
    #panel { max-width: 94vw; overflow-x: auto; scrollbar-width: none; }
    #panel::-webkit-scrollbar { display: none; }
  }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>

<div class="ui" id="masthead">
  <a class="back" href="../">← Index</a>
  <h1>Flow Fields</h1>
  <div class="sub"><b>2,200</b> particles · value-noise field</div>
</div>

<div class="ui" id="info"></div>

<div class="ui" id="hint">
  click the canvas for a new piece<br>
  every seed paints a different artwork
</div>

<div class="ui" id="panel">
  <button id="regen">New artwork</button>
  <button id="palette">Next palette</button>
  <div class="sep"></div>
  <button id="save">Save PNG</button>
</div>

<script>
'use strict';
// ============================================================
//  Flow-field painting: thousands of particles follow a
//  hand-rolled fractal value-noise vector field, leaving
//  translucent trails that accumulate into an artwork.
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const infoEl = document.getElementById('info');
let W = 0, H = 0;

const PALETTES = [
  { name: 'Aurora',   bg: '#04070d', colors: ['#2dd4bf', '#5eead4', '#7c6cff', '#a78bfa', '#e8edf7'] },
  { name: 'Ember',    bg: '#0a0505', colors: ['#fb923c', '#f97316', '#facc15', '#f472b6', '#fda4af'] },
  { name: 'Deep Sea', bg: '#03060c', colors: ['#0ea5e9', '#38bdf8', '#2dd4bf', '#1e40af', '#a5f3fc'] },
  { name: 'Orchid',   bg: '#08040c', colors: ['#f472b6', '#e879f9', '#a78bfa', '#c4b5fd', '#fbcfe8'] },
  { name: 'Meadow',   bg: '#040804', colors: ['#4ade80', '#a3e635', '#2dd4bf', '#fde047', '#86efac'] },
  { name: 'Ink & Gold', bg: '#0b0b10', colors: ['#eab308', '#fcd34d', '#e8edf7', '#94a3b8', '#fef3c7'] }
];

// --- seeded RNG + 2-octave value noise ---
function mulberry32(seed) {
  let a = seed >>> 0;
  return () => {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function makeNoise(seed) {
  const rand = mulberry32(seed);
  const N = 128;
  const grid = new Float32Array(N * N);
  for (let i = 0; i < grid.length; i++) grid[i] = rand();
  const at = (x, y) => grid[((y & (N - 1)) * N) + (x & (N - 1))];
  function base(x, y) {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const sx = xf * xf * (3 - 2 * xf), sy = yf * yf * (3 - 2 * yf);
    const a = at(xi, yi)     + (at(xi + 1, yi)     - at(xi, yi))     * sx;
    const b = at(xi, yi + 1) + (at(xi + 1, yi + 1) - at(xi, yi + 1)) * sx;
    return a + (b - a) * sy;
  }
  return (x, y) => base(x, y) * 0.65 + base(x * 2.7 + 31.4, y * 2.7 + 47.2) * 0.35;
}

// --- artwork state ---
let noise, rand, seed, paletteIdx = 0, particles = [], born = 0;
const COUNT = 2200;

function spawn(p) {
  p.x = rand() * W;
  p.y = rand() * H;
  p.px = p.x; p.py = p.y;
  p.life = 80 + rand() * 220;
  const pal = PALETTES[paletteIdx];
  p.color = pal.colors[Math.floor(rand() * pal.colors.length)];
  p.width = rand() < 0.12 ? 3.2 : 1.4;
  p.speed = 1.2 + rand() * 1.8;
}

let fieldScale, fieldTwist;
function restart(newSeed = Math.floor(Math.random() * 1e9)) {
  seed = newSeed;
  rand = mulberry32(seed);
  noise = makeNoise(seed);
  fieldScale = 0.0018 + rand() * 0.0038;        // zoom of the field
  fieldTwist = 2.5 + rand() * 4.5;              // how many full turns the angle spans
  particles = Array.from({ length: COUNT }, () => {
    const p = {};
    spawn(p);
    return p;
  });
  born = performance.now();
  const pal = PALETTES[paletteIdx];
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);
  infoEl.innerHTML = `<b>${pal.name}</b> · seed ${seed}`;
}

function resize() {
  W = canvas.width = canvas.clientWidth * Math.min(devicePixelRatio || 1, 2);
  H = canvas.height = canvas.clientHeight * Math.min(devicePixelRatio || 1, 2);
}

function frame() {
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.26;
  for (let sub = 0; sub < 2; sub++) {         // two field steps per frame
    for (const p of particles) {
      const n = noise(p.x * fieldScale, p.y * fieldScale);
      const a = n * Math.PI * fieldTwist;
      p.px = p.x; p.py = p.y;
      p.x += Math.cos(a) * p.speed;
      p.y += Math.sin(a) * p.speed;
      p.life--;
      if (p.life <= 0 || p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10) {
        spawn(p);
        continue;
      }
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.width;
      ctx.beginPath();
      ctx.moveTo(p.px, p.py);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(frame);
}

// ---------------- UI ----------------
document.getElementById('regen').addEventListener('click', () => restart());
canvas.addEventListener('click', () => restart());
document.getElementById('palette').addEventListener('click', () => {
  paletteIdx = (paletteIdx + 1) % PALETTES.length;
  restart(seed);                                // same field, new colors
});
document.getElementById('save').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `flowfield-${seed}.png`;
  a.click();
});
addEventListener('resize', () => { resize(); restart(seed); });

resize();
restart();
requestAnimationFrame(frame);
</script>
</body>
</html>
