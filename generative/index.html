<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Fields — Fable 5 Showcase</title>
<style>
  :root { --bg: #05080f; --text: #e8edf7; --muted: #8b96ad; --border: rgba(140,160,200,0.18); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.4rem;
    z-index: 2;
  }
  header a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
  header a:hover { color: var(--text); }
  header .title { font-weight: 700; }
  header .title em {
    font-style: normal;
    background: linear-gradient(90deg, #fb923c, #f472b6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #stage { flex: 1; position: relative; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: pointer; }
  .panel {
    position: absolute;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    background: rgba(10,16,28,0.82);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.6rem 0.8rem;
    backdrop-filter: blur(8px);
    z-index: 2;
  }
  .panel button {
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.45rem 0.95rem;
    font-size: 0.86rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .panel button:hover { background: rgba(255,255,255,0.1); }
  .info {
    position: absolute;
    top: 0.8rem;
    left: 1.2rem;
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.7;
    z-index: 2;
    pointer-events: none;
  }
  .info b { color: var(--text); }
</style>
</head>
<body>
<header>
  <a href="../">← Fable 5 Showcase</a>
  <span class="title">FLOW <em>FIELDS</em></span>
  <span style="width:110px"></span>
</header>
<div id="stage">
  <canvas id="c"></canvas>
  <div class="info" id="info"></div>
  <div class="panel">
    <button id="regen">✦ New artwork</button>
    <button id="palette">◧ Next palette</button>
    <button id="save">⬇ Save PNG</button>
  </div>
</div>

<script>
'use strict';
// ============================================================
//  Flow-field painting: thousands of particles follow a
//  hand-rolled fractal value-noise vector field, leaving
//  translucent trails that accumulate into an artwork.
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const infoEl = document.getElementById('info');
let W = 0, H = 0;

const PALETTES = [
  { name: 'Aurora',   bg: '#04070d', colors: ['#2dd4bf', '#5eead4', '#7c6cff', '#a78bfa', '#e8edf7'] },
  { name: 'Ember',    bg: '#0a0505', colors: ['#fb923c', '#f97316', '#facc15', '#f472b6', '#fda4af'] },
  { name: 'Deep Sea', bg: '#03060c', colors: ['#0ea5e9', '#38bdf8', '#2dd4bf', '#1e40af', '#a5f3fc'] },
  { name: 'Orchid',   bg: '#08040c', colors: ['#f472b6', '#e879f9', '#a78bfa', '#c4b5fd', '#fbcfe8'] },
  { name: 'Meadow',   bg: '#040804', colors: ['#4ade80', '#a3e635', '#2dd4bf', '#fde047', '#86efac'] },
  { name: 'Ink & Gold', bg: '#0b0b10', colors: ['#eab308', '#fcd34d', '#e8edf7', '#94a3b8', '#fef3c7'] }
];

// --- seeded RNG + 2-octave value noise ---
function mulberry32(seed) {
  let a = seed >>> 0;
  return () => {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function makeNoise(seed) {
  const rand = mulberry32(seed);
  const N = 128;
  const grid = new Float32Array(N * N);
  for (let i = 0; i < grid.length; i++) grid[i] = rand();
  const at = (x, y) => grid[((y & (N - 1)) * N) + (x & (N - 1))];
  function base(x, y) {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const sx = xf * xf * (3 - 2 * xf), sy = yf * yf * (3 - 2 * yf);
    const a = at(xi, yi)     + (at(xi + 1, yi)     - at(xi, yi))     * sx;
    const b = at(xi, yi + 1) + (at(xi + 1, yi + 1) - at(xi, yi + 1)) * sx;
    return a + (b - a) * sy;
  }
  return (x, y) => base(x, y) * 0.65 + base(x * 2.7 + 31.4, y * 2.7 + 47.2) * 0.35;
}

// --- artwork state ---
let noise, rand, seed, paletteIdx = 0, particles = [], born = 0;
const COUNT = 2200;

function spawn(p) {
  p.x = rand() * W;
  p.y = rand() * H;
  p.px = p.x; p.py = p.y;
  p.life = 80 + rand() * 220;
  const pal = PALETTES[paletteIdx];
  p.color = pal.colors[Math.floor(rand() * pal.colors.length)];
  p.width = rand() < 0.12 ? 3.2 : 1.4;
  p.speed = 1.2 + rand() * 1.8;
}

let fieldScale, fieldTwist;
function restart(newSeed = Math.floor(Math.random() * 1e9)) {
  seed = newSeed;
  rand = mulberry32(seed);
  noise = makeNoise(seed);
  fieldScale = 0.0018 + rand() * 0.0038;        // zoom of the field
  fieldTwist = 2.5 + rand() * 4.5;              // how many full turns the angle spans
  particles = Array.from({ length: COUNT }, () => {
    const p = {};
    spawn(p);
    return p;
  });
  born = performance.now();
  const pal = PALETTES[paletteIdx];
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, W, H);
  infoEl.innerHTML = `<b>${pal.name}</b> · seed ${seed}<br>${COUNT.toLocaleString()} particles · click canvas for a new piece`;
}

function resize() {
  W = canvas.width = canvas.clientWidth * Math.min(devicePixelRatio || 1, 2);
  H = canvas.height = canvas.clientHeight * Math.min(devicePixelRatio || 1, 2);
}

function frame() {
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.26;
  for (let sub = 0; sub < 2; sub++) {         // two field steps per frame
    for (const p of particles) {
      const n = noise(p.x * fieldScale, p.y * fieldScale);
      const a = n * Math.PI * fieldTwist;
      p.px = p.x; p.py = p.y;
      p.x += Math.cos(a) * p.speed;
      p.y += Math.sin(a) * p.speed;
      p.life--;
      if (p.life <= 0 || p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10) {
        spawn(p);
        continue;
      }
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.width;
      ctx.beginPath();
      ctx.moveTo(p.px, p.py);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(frame);
}

// ---------------- UI ----------------
document.getElementById('regen').addEventListener('click', () => restart());
canvas.addEventListener('click', () => restart());
document.getElementById('palette').addEventListener('click', () => {
  paletteIdx = (paletteIdx + 1) % PALETTES.length;
  restart(seed);                                // same field, new colors
});
document.getElementById('save').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `flowfield-${seed}.png`;
  a.click();
});
addEventListener('resize', () => { resize(); restart(seed); });

resize();
restart();
requestAnimationFrame(frame);
</script>
</body>
</html>
